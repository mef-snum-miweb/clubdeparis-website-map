// ---------------------------------------------------------------------------
// Web Component
// ---------------------------------------------------------------------------
class ClubParisMap extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._data = null;
    this._selectedYear = 2024;
    this._filterMode = 'all';
    this._debtFilter = 'apd';
    this._selectedIso = null;
    this._geojson = null;
    this._projection = null;
    this._pathGen = null;
    this._zoom = null;
    this._lang = 'fr';
  }

  _detectLang() {
    const attr = this.getAttribute('lang');
    if (attr === 'en') return 'en';
    if (attr === 'fr') return 'fr';
    const params = new URLSearchParams(window.location.search);
    const p = params.get('lang');
    if (p === 'en') return 'en';
    if (p === 'fr') return 'fr';
    const html = document.documentElement.lang?.toLowerCase() ?? '';
    if (html.startsWith('en')) return 'en';
    return 'fr';
  }

  _t(key) {
    return TRANSLATIONS[this._lang][key] ?? TRANSLATIONS.fr[key] ?? key;
  }

  _isoToName(iso) {
    return COUNTRY_NAMES[this._lang][iso] || iso;
  }

  _isoToNameMap() {
    return COUNTRY_NAMES[this._lang];
  }

  connectedCallback() {
    this._lang = this._detectLang();
    this.shadowRoot.innerHTML = `
      <style>${this._getStyles()}</style>
      <div class="wrapper">
        <div class="map-area" id="map-area">
          <div class="search-container" id="search-container">
            <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="${this._t('search.placeholder')}" autocomplete="off" />
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
          <div class="panel" id="panel">
            <button class="panel-close" id="panel-close">&times;</button>
            <div id="panel-content"></div>
          </div>
          <div class="tooltip" id="tooltip"></div>
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <span>${this._t('loading')}</span>
          </div>
        </div>
        <div class="bottom-bar">
          <div class="filter-row">
            <span class="filter-label">${this._t('filter.label')}</span>
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">${this._t('filter.all')}</button>
              <button class="filter-btn filter-debtor" data-filter="débiteur">${this._t('filter.debtors')}</button>
              <button class="filter-btn filter-creditor" data-filter="créditeur">${this._t('filter.creditors')}</button>
            </div>
            <div class="filter-group debt-sub" style="display:none">
              <button class="filter-btn sub active" data-debt="apd">${this._t('filter.apd')}</button>
              <button class="filter-btn sub" data-debt="napd">${this._t('filter.napd')}</button>
            </div>
            <div class="filter-spacer"></div>
            <div class="legend-bar">
              <div class="legend-item">
                <div class="legend-gradient debtor-gradient"></div>
                <span class="legend-text">${this._t('map.legend_debtors')}</span>
              </div>
              <div class="legend-item">
                <div class="legend-gradient creditor-gradient"></div>
                <span class="legend-text">${this._t('map.legend_creditors')}</span>
              </div>
            </div>
          </div>
          <div class="year-row">
            <input type="range" class="year-slider" id="year-slider" min="2010" max="2024" value="2024" step="1" />
            <div class="year-labels" id="year-labels"></div>
          </div>
        </div>
      </div>
    `;
    this._setup();
  }

  async _setup() {
    this._buildYearLabels();
    this._bindEvents();
    await this._loadData();
    this._initMap();
    this.shadowRoot.getElementById('loading').style.display = 'none';
  }

  _buildYearLabels() {
    const container = this.shadowRoot.getElementById('year-labels');
    for (let y = 2010; y <= 2024; y++) {
      const btn = document.createElement('button');
      btn.className = 'year-label' + (y === 2024 ? ' active' : '');
      btn.textContent = y;
      btn.dataset.year = y;
      container.appendChild(btn);
    }
  }

  _bindEvents() {
    const sr = this.shadowRoot;
    sr.querySelectorAll('.filter-btn:not(.sub)').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn:not(.sub)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._filterMode = btn.dataset.filter;
        sr.querySelector('.debt-sub').style.display = this._filterMode === 'débiteur' ? 'flex' : 'none';
        this._updateColors();
      });
    });
    sr.querySelectorAll('.filter-btn.sub').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn.sub').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._debtFilter = btn.dataset.debt;
        this._updateColors();
      });
    });
    const slider = sr.getElementById('year-slider');
    slider.addEventListener('input', () => {
      this._selectedYear = parseInt(slider.value);
      this._updateYearLabels();
      this._updateColors();
      this._updatePanel();
    });
    sr.getElementById('year-labels').addEventListener('click', (e) => {
      if (e.target.dataset.year) {
        this._selectedYear = parseInt(e.target.dataset.year);
        slider.value = this._selectedYear;
        this._updateYearLabels();
        this._updateColors();
        this._updatePanel();
      }
    });
    sr.getElementById('panel-close').addEventListener('click', () => this._closePanel());

    // Search autocomplete
    const searchInput = sr.getElementById('search-input');
    const searchDropdown = sr.getElementById('search-dropdown');
    let activeIdx = -1;

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) { searchDropdown.classList.remove('open'); return; }
      const results = this._searchCountries(query);
      activeIdx = -1;
      if (results.length === 0) {
        searchDropdown.innerHTML = `<div class="search-no-result">${this._t('search.no_result')}</div>`;
      } else {
        searchDropdown.innerHTML = results.map((r, i) =>
          `<div class="search-option" data-iso="${r.iso}" data-index="${i}">${r.highlighted}</div>`
        ).join('');
      }
      searchDropdown.classList.add('open');
    });

    searchInput.addEventListener('keydown', (e) => {
      const options = searchDropdown.querySelectorAll('.search-option');
      if (!options.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, options.length - 1);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const sel = activeIdx >= 0 ? options[activeIdx] : options[0];
        if (sel) {
          this._selectCountry(sel.dataset.iso);
          searchInput.value = this._isoToName(sel.dataset.iso);
          searchDropdown.classList.remove('open');
        }
      } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
        searchInput.blur();
      }
    });

    searchDropdown.addEventListener('click', (e) => {
      const opt = e.target.closest('.search-option');
      if (opt) {
        this._selectCountry(opt.dataset.iso);
        searchInput.value = this._isoToName(opt.dataset.iso);
        searchDropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', (e) => {
      if (!this.shadowRoot.getElementById('search-container').contains(e.composedPath()[0])) {
        searchDropdown.classList.remove('open');
      }
    });
  }

  _updateYearLabels() {
    this.shadowRoot.querySelectorAll('.year-label').forEach(l => {
      l.classList.toggle('active', parseInt(l.dataset.year) === this._selectedYear);
    });
  }

  async _loadData() {
    const base = new URL('.', location.href).href;
    const [dataResp, topoResp] = await Promise.all([
      fetch(base + 'data.json'),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    ]);
    this._data = await dataResp.json();
    const topo = await topoResp.json();
    this._geojson = topojson.feature(topo, topo.objects.countries);
  }

  _initMap() {
    const container = this.shadowRoot.getElementById('map-area');
    const w = container.clientWidth;
    const h = container.clientHeight;

    this._projection = d3.geoMercator()
      .scale(w / 6.5)
      .center([10, 25])
      .translate([w / 2, h / 2]);

    this._pathGen = d3.geoPath().projection(this._projection);

    const svg = d3.select(container)
      .insert('svg', ':first-child')
      .attr('width', w)
      .attr('height', h)
      .style('display', 'block');

    const g = svg.append('g');

    this._zoom = d3.zoom()
      .scaleExtent([1, 8])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(this._zoom);

    const self = this;
    g.selectAll('path')
      .data(this._geojson.features)
      .join('path')
      .attr('d', this._pathGen)
      .attr('class', 'country')
      .attr('data-id', d => this._numToIso(String(d.id)) || '')
      .attr('fill', d => {
        const iso = this._numToIso(String(d.id));
        return iso ? this._getColor(iso) : '#e8c4b0';
      })
      .attr('stroke', '#90a4ae')
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', function(event, d) {
        const iso = self._numToIso(String(d.id));
        if (iso) self._selectCountry(iso);
      })
      .on('mouseenter', function(event, d) {
        const iso = self._numToIso(String(d.id));
        d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5);
        self._showTooltip(event, iso, d);
      })
      .on('mousemove', function(event) {
        self._moveTooltip(event);
      })
      .on('mouseleave', function() {
        const iso = self._numToIso(String(d3.select(this).datum().id));
        const isSel = iso === self._selectedIso;
        d3.select(this)
          .attr('stroke', isSel ? '#fbbf24' : '#90a4ae')
          .attr('stroke-width', isSel ? 2 : 0.5);
        self._hideTooltip();
      });

    this._svg = svg;
    this._g = g;

    this._resizeObserver = new ResizeObserver(() => this._onResize());
    this._resizeObserver.observe(container);
  }

  _onResize() {
    const container = this.shadowRoot.getElementById('map-area');
    if (!container || !this._svg) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w < 1 || h < 1) return;

    this._projection
      .scale(w / 6.5)
      .center([10, 25])
      .translate([w / 2, h / 2]);
    this._pathGen = d3.geoPath().projection(this._projection);

    this._svg.attr('width', w).attr('height', h);
    this._g.selectAll('path.country').attr('d', this._pathGen);

    this._svg.call(this._zoom.transform, d3.zoomIdentity);
  }

  _updateColors() {
    if (!this._g) return;
    this._maxDebtor = null;
    this._computeMaxValues();
    const self = this;
    this._g.selectAll('path.country')
      .attr('fill', function() {
        const iso = d3.select(this).attr('data-id');
        return iso ? self._getColor(iso) : '#e8c4b0';
      })
      .attr('stroke', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? '#fbbf24' : '#90a4ae';
      })
      .attr('stroke-width', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? 2 : 0.5;
      });
  }

  _showTooltip(event, iso, d) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const yd = this._getYearData();
    const c = yd?.countries[iso];
    const name = this._isoToName(iso) || d.properties?.name || iso;
    let text = name;
    if (c) {
      if (c.debtor && c.debtor.total > 0) text += ` — ${this._t('map.debt')}: ${this._fmt(c.debtor.total)}`;
      if (c.creditor) text += ` — ${this._t('map.creditor_label')} (${c.creditor.nbAccords} ${this._t('map.agreements')})`;
    }
    tip.textContent = text;
    tip.style.display = 'block';
    this._moveTooltip(event);
  }

  _moveTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    const rect = area.getBoundingClientRect();
    tip.style.left = (event.clientX - rect.left + 12) + 'px';
    tip.style.top = (event.clientY - rect.top - 28) + 'px';
  }

  _hideTooltip() {
    this.shadowRoot.getElementById('tooltip').style.display = 'none';
  }

  _selectCountry(iso) {
    this._selectedIso = iso;
    this._updateColors();
    this._updatePanel();
    this.shadowRoot.getElementById('panel').classList.add('open');
  }

  _closePanel() {
    this.shadowRoot.getElementById('panel').classList.remove('open');
    this._selectedIso = null;
    this._updateColors();
  }

  _searchCountries(query) {
    const yd = this._getYearData();
    if (!yd) return [];
    const names = this._isoToNameMap();
    const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const nQuery = normalize(query);
    const results = [];
    for (const [iso, name] of Object.entries(names)) {
      const country = yd.countries[iso];
      if (this._filterMode === 'débiteur' && !(country && country.debtor && country.debtor.total > 0)) continue;
      if (this._filterMode === 'créditeur' && !(country && country.creditor)) continue;
      const nName = normalize(name);
      const idx = nName.indexOf(nQuery);
      if (idx === -1) continue;
      const matchLen = nQuery.length;
      const highlighted = name.substring(0, idx)
        + '<span class="match">' + name.substring(idx, idx + matchLen) + '</span>'
        + name.substring(idx + matchLen);
      results.push({ iso, name, highlighted, startsWithMatch: idx === 0 });
    }
    results.sort((a, b) => {
      if (a.startsWithMatch !== b.startsWithMatch) return a.startsWithMatch ? -1 : 1;
      return a.name.localeCompare(b.name, this._lang);
    });
    return results.slice(0, 6);
  }

  // ---- Data helpers ----

  _getYearData() {
    return this._data ? this._data[String(this._selectedYear)] : null;
  }

  _getColor(iso) {
    const yd = this._getYearData();
    if (!yd) return '#e8c4b0';
    const c = yd.countries[iso];
    if (!c) return '#e8c4b0';
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;
    if (!this._maxDebtor) this._computeMaxValues();

    if (this._filterMode === 'créditeur') {
      return isCreditor ? this._greenScale(c.creditor.nbAccords) : '#e8c4b0';
    }
    if (this._filterMode === 'débiteur') {
      if (!isDebtor) return '#e8c4b0';
      const val = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
      return val > 0 ? this._orangeScale(val) : '#e8c4b0';
    }
    if (isCreditor && !isDebtor) return this._greenScale(c.creditor.nbAccords);
    if (isDebtor) return this._orangeScale(c.debtor.apd);
    if (isCreditor) return this._greenScale(c.creditor.nbAccords);
    return '#e8c4b0';
  }

  _computeMaxValues() {
    const yd = this._getYearData();
    if (!yd) { this._maxDebtor = 1; this._maxCreditor = 1; return; }
    let maxD = 1, maxC = 1;
    for (const c of Object.values(yd.countries)) {
      if (c.debtor) {
        const v = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
        if (v > maxD) maxD = v;
      }
      if (c.creditor && c.creditor.nbAccords > maxC) maxC = c.creditor.nbAccords;
    }
    this._maxDebtor = maxD;
    this._maxCreditor = maxC;
  }

  _orangeScale(val) {
    const t = Math.min(val / this._maxDebtor, 1);
    return this._interpolateColors([[8,48,107],[33,113,181],[107,174,214],[199,233,252]], t);
  }

  _greenScale(val) {
    const t = Math.min(val / this._maxCreditor, 1);
    return this._interpolateColors([[236,253,245],[110,231,183],[16,185,129],[4,120,87]], t);
  }

  _interpolateColors(colors, t) {
    const n = colors.length - 1;
    const idx = Math.min(Math.floor(t * n), n - 1);
    const local = (t * n) - idx;
    const c1 = colors[idx], c2 = colors[idx + 1];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * local);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * local);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * local);
    return `rgb(${r},${g},${b})`;
  }

  _updatePanel() {
    const el = this.shadowRoot.getElementById('panel-content');
    if (!this._selectedIso) { el.innerHTML = ''; return; }
    const yd = this._getYearData();
    const c = yd?.countries[this._selectedIso];
    if (!c) { el.innerHTML = `<p class="no-data">${this._t('map.no_data')}</p>`; return; }

    const name = this._isoToName(this._selectedIso) || c.country;
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;

    let html = `<h2 class="panel-title">${name}</h2>`;

    if (isDebtor) {
      const d = c.debtor;
      html += `
        <div class="info-card">
          <div class="info-icon info-icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.apd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.apd)}</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon info-icon-orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.napd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.napd)}</span>
          </div>
        </div>
      `;
    }

    html += `
      <div class="info-card">
        <div class="info-icon info-icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="info-body">
          <span class="info-label">${this._t('panel.last_update')}</span>
          <span class="info-value">${this._selectedYear}</span>
        </div>
      </div>
    `;

    if (isCreditor) {
      const cr = c.creditor;
      html += `<div class="panel-section-title">${this._t('panel.section_creditor').toUpperCase()}</div>`;
      html += `<ul class="panel-details">`;
      html += `<li><span class="detail-label">${this._t('panel.agreements')}</span><span class="detail-value">${cr.nbAccords}</span></li>`;
      if (cr.premiereParticipation) html += `<li><span class="detail-label">${this._t('panel.member_since')}</span><span class="detail-value">${cr.premiereParticipation}</span></li>`;
      if (cr.statut) html += `<li><span class="detail-label">${this._t('panel.status')}</span><span class="detail-value">${cr.statut}</span></li>`;
      html += `</ul>`;
    }

    const url = (isDebtor && c.debtor.url) || (isCreditor && c.creditor.url);
    if (url) {
      html += `<a class="panel-cta" href="${url}" target="_blank" rel="noopener">${this._t('panel.debtor_link')}</a>`;
    }

    el.innerHTML = html;
  }

  _fmt(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(2)} Md\u20AC`;
    if (val >= 1e6) return `${(val / 1e6).toFixed(1)} M\u20AC`;
    if (val === 0) return '0 \u20AC';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' \u20AC';
  }

  _fmtPanel(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} milliards \u20AC`;
    if (val >= 1e6) return `${Math.round(val / 1e6).toLocaleString('fr-FR')} millions \u20AC`;
    if (val === 0) return '0 \u20AC';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' \u20AC';
  }
