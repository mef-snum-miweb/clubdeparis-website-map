// Country names: EN comes from the WB topojson NAM_0 field (built into
// `_wbNames` at load time); FR comes from data.json (`country`, populated
// from `sources/countries.csv`).

// ---------------------------------------------------------------------------
// Web Component
// ---------------------------------------------------------------------------
class ClubParisMap extends HTMLElement {
  // Charte "Carte interactive Club de Paris" — couleurs hybrides (chaque
  // catégorie = couleur de fond + motif spécifique défini dans les <pattern>).
  static CREDITOR_PERMANENT_COLOR = '#4d84bc';   // membre permanent (hachures fines \)
  static CREDITOR_ADHOC_COLOR = '#4d84bc';       // membre ad hoc     (hachures medium \)
  static CREDITOR_PROSPECTIVE_COLOR = '#7fa9d1'; // membre prospectif (hachures épaisses \)
  static DEBTOR_ACCORD_COLOR = '#fee090';        // débiteur traité   (hachures fines espacées /)
  static DEBTOR_ENCOURS_COLOR = '#fee090';       // débiteur encours  (hachures épaisses espacées /)
  static DEFAULT_COLOR = '#e8c4b0';              // pays non traité   (hachures fines #4d84bc \)
  static SEA_COLOR = '#E0F3F8';                  // mer / océan (fond de carte)

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._data = null;
    this._selectedYear = 2024;
    this._filterMode = 'all';
    this._selectedIso = null;
    this._geojson = null;
    this._projection = null;
    this._pathGen = null;
    this._zoom = null;
    this._lang = 'fr';
  }

  _detectLang() {
    const attr = this.getAttribute('lang');
    if (attr === 'en') return 'en';
    if (attr === 'fr') return 'fr';
    const params = new URLSearchParams(window.location.search);
    const p = params.get('lang');
    if (p === 'en') return 'en';
    if (p === 'fr') return 'fr';
    const html = document.documentElement.lang?.toLowerCase() ?? '';
    if (html.startsWith('en')) return 'en';
    return 'fr';
  }

  _t(key) {
    return TRANSLATIONS[this._lang][key] ?? TRANSLATIONS.fr[key] ?? key;
  }

  _isoToName(iso) {
    if (this._lang === 'fr') {
      const yd = this._getYearData();
      const fr = yd?.countries?.[iso]?.country;
      if (fr) return fr;
    }
    return this._wbNames?.[iso] || iso;
  }

  _isoToNameMap() {
    const out = {};
    const yd = this._getYearData();
    const fr = this._lang === 'fr';
    for (const iso of Object.keys(this._wbNames || {})) {
      out[iso] = (fr && yd?.countries?.[iso]?.country) || this._wbNames[iso];
    }
    if (fr && yd) {
      for (const [iso, c] of Object.entries(yd.countries || {})) {
        if (!out[iso] && c?.country) out[iso] = c.country;
      }
    }
    return out;
  }

  connectedCallback() {
    this._lang = this._detectLang();
    this.shadowRoot.innerHTML = `
      <style>${this._getStyles()}</style>
      <div class="wrapper">
        <a href="#info-row" class="skip-link" id="skip-link">${this._t('a11y.skip')}</a>
        <header class="map-header">
          <h1 class="map-title" id="map-title"></h1>
          <p class="map-meta">
            <span class="map-meta-item"><strong>${this._t('header.source')}</strong> ${this._t('header.source_name')}</span>
            <span class="map-meta-sep" aria-hidden="true">·</span>
            <span class="map-meta-item"><strong>${this._t('header.updated')}</strong> ${this._t('header.updated_date')}</span>
          </p>
        </header>
        <p class="sr-only" id="map-instructions">${this._t('a11y.map_instructions')}</p>
        <div class="sr-only" role="status" aria-live="polite" id="sr-announce"></div>
        <div class="map-area" id="map-area">
          <div class="panel" id="panel" inert>
            <button class="panel-close" id="panel-close" aria-label="${this._t('a11y.close_panel')}">&times;</button>
            <div id="panel-content"></div>
          </div>
          <div class="tooltip" id="tooltip"></div>
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <span>${this._t('loading')}</span>
          </div>
          <div class="search-container" id="search-container">
            <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="${this._t('search.placeholder')}" autocomplete="off" />
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
          <details class="legend-panel">
            <summary class="legend-toggle">
              <svg class="legend-caret" viewBox="0 0 12 12" aria-hidden="true"><path d="M3 4.5L6 7.5L9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>${this._t('legend.label')}</span>
            </summary>
            <ul class="legend-bar">
              ${[
                ['creditor-permanent', 'map.legend_creditor_permanent'],
                ['creditor-adhoc',     'map.legend_creditor_adhoc'],
                ['creditor-prospective','map.legend_creditor_prospective'],
                ['debtor-accord',      'map.legend_debtor_accord'],
                ['debtor-encours',     'map.legend_debtor_encours'],
                ['no-data',            'map.legend_no_data'],
              ].map(([cat, key]) => `
                <li class="legend-item">
                  <span class="legend-swatch">
                    <svg width="100%" height="100%" viewBox="0 0 30 30" preserveAspectRatio="none" aria-hidden="true">
                      <rect width="30" height="30" fill="url(#pattern-${cat}-0)" />
                    </svg>
                  </span>
                  <span class="legend-text">${this._t(key)}</span>
                </li>`).join('')}
            </ul>
          </details>
        </div>
        <div class="bottom-bar">
          <div class="filter-row">
            <span class="filter-label">${this._t('filter.label')}</span>
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">${this._t('filter.all')}</button>
              <button class="filter-btn filter-creditor" data-filter="créditeur">${this._t('filter.creditors')}</button>
              <button class="filter-btn filter-debtor" data-filter="débiteur">${this._t('filter.debtors')}</button>
            </div>
          </div>
          <!-- SLIDER TEMPORAIREMENT DÉSACTIVÉ — à réactiver quand l'historique multi-années sera réintégré
          <div class="year-row">
            <input type="range" class="year-slider" id="year-slider" min="2010" max="2024" value="2024" step="1" />
            <div class="year-labels" id="year-labels"></div>
          </div>
          -->
          <details class="info-row" id="info-row">
            <summary>
              <span class="info-chevron" aria-hidden="true">▸</span>
              <span>${this._t('info.summary')}</span>
            </summary>
            <div class="info-content">
              <div class="info-desc">${this._t('info.desc_body')}</div>
              <div class="info-dl-title">${this._t('info.dl_title')}</div>
              <div class="info-dl-note">${this._t('info.dl_note')}</div>
              <ul class="info-dl-list">
                <li><a href="downloads/club_de_paris_pays_debiteurs.csv" download>${this._t('info.dl_debt_fr')}</a></li>
                <li><a href="downloads/club_de_paris_debtor_countries.csv" download>${this._t('info.dl_debt_en')}</a></li>
                <li><a href="downloads/club_de_paris_pays_crediteurs.csv" download>${this._t('info.dl_cred_fr')}</a></li>
                <li><a href="downloads/club_de_paris_creditor_countries.csv" download>${this._t('info.dl_cred_en')}</a></li>
              </ul>
              <h3 class="info-tables-title" id="info-tables-title"></h3>
              <div class="info-tables-search">
                <label class="sr-only" for="info-table-filter">${this._t('info.tables_search_placeholder')}</label>
                <input type="search" id="info-table-filter" class="info-table-filter-input" placeholder="${this._t('info.tables_search_placeholder')}" autocomplete="off" />
              </div>
              <div class="info-tables" id="info-tables">
                <!-- populated by _buildTables() -->
              </div>
              <p class="info-table-empty sr-only" id="info-table-empty" role="status" aria-live="polite">${this._t('info.tables_no_result')}</p>
            </div>
          </details>
        </div>
      </div>
    `;
    this._setup();
  }

  async _setup() {
    // this._buildYearLabels(); // SLIDER TEMPORAIREMENT DÉSACTIVÉ
    this._bindEvents();
    this._updateMapHeader();
    await this._loadData();
    this._initMap();
    this._updateMapA11yLabel();
    this._updateTabindex();
    this._buildTables();
    this.shadowRoot.getElementById('loading').style.display = 'none';
  }

  _updateMapHeader() {
    const el = this.shadowRoot.getElementById('map-title');
    if (!el) return;
    el.textContent = `${this._t('header.title')} — ${this._selectedYear}`;
  }

  _updateMapA11yLabel() {
    if (!this._svg) return;
    const label = this._t('a11y.map_label').replace('{0}', this._selectedYear);
    this._svg.attr('aria-label', label);
  }

  _announce(msg) {
    const el = this.shadowRoot.getElementById('sr-announce');
    if (!el) return;
    // Clear first so assistive tech re-announces the same message.
    el.textContent = '';
    setTimeout(() => { el.textContent = msg; }, 30);
  }

  /* SLIDER TEMPORAIREMENT DÉSACTIVÉ
  _onYearChanged() {
    this._updateYearLabels();
    this._updateColors();
    this._updatePanel();
    this._updateMapHeader();
    this._updateMapA11yLabel();
    this._updateTabindex();
    this._buildTables();
  }
  */

  /* SLIDER TEMPORAIREMENT DÉSACTIVÉ
  _buildYearLabels() {
    const container = this.shadowRoot.getElementById('year-labels');
    for (let y = 2010; y <= 2024; y++) {
      const btn = document.createElement('button');
      btn.className = 'year-label' + (y === 2024 ? ' active' : '');
      btn.textContent = y;
      btn.dataset.year = y;
      container.appendChild(btn);
    }
  }
  */

  _bindEvents() {
    const sr = this.shadowRoot;
    sr.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._filterMode = btn.dataset.filter;
        this._updateColors();
        this._updateTabindex();
      });
    });
    /* SLIDER TEMPORAIREMENT DÉSACTIVÉ
    const slider = sr.getElementById('year-slider');
    slider.addEventListener('input', () => {
      this._selectedYear = parseInt(slider.value);
      this._onYearChanged();
    });
    sr.getElementById('year-labels').addEventListener('click', (e) => {
      if (e.target.dataset.year) {
        this._selectedYear = parseInt(e.target.dataset.year);
        slider.value = this._selectedYear;
        this._onYearChanged();
      }
    });
    */

    // Accordion table filter
    const tableFilter = sr.getElementById('info-table-filter');
    if (tableFilter) {
      tableFilter.addEventListener('input', () => {
        this._filterTables(tableFilter.value);
      });
    }
    sr.getElementById('panel-close').addEventListener('click', () => this._closePanel());

    // Skip link → open the a11y disclosure row and focus its summary
    const skipLink = sr.getElementById('skip-link');
    const infoRow = sr.getElementById('info-row');
    if (skipLink && infoRow) {
      skipLink.addEventListener('click', (e) => {
        e.preventDefault();
        infoRow.open = true;
        const summary = infoRow.querySelector('summary');
        if (summary) {
          summary.focus();
          summary.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      });
    }

    // Search autocomplete
    const searchInput = sr.getElementById('search-input');
    const searchDropdown = sr.getElementById('search-dropdown');
    let activeIdx = -1;

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) { searchDropdown.classList.remove('open'); return; }
      const results = this._searchCountries(query);
      activeIdx = -1;
      if (results.length === 0) {
        searchDropdown.innerHTML = `<div class="search-no-result">${this._t('search.no_result')}</div>`;
      } else {
        searchDropdown.innerHTML = results.map((r, i) =>
          `<div class="search-option" data-iso="${r.iso}" data-index="${i}">${r.highlighted}</div>`
        ).join('');
      }
      searchDropdown.classList.add('open');
    });

    searchInput.addEventListener('keydown', (e) => {
      const options = searchDropdown.querySelectorAll('.search-option');
      if (!options.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, options.length - 1);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const sel = activeIdx >= 0 ? options[activeIdx] : options[0];
        if (sel) {
          this._selectCountry(sel.dataset.iso);
          this._zoomToCountry(sel.dataset.iso);
          searchInput.value = this._isoToName(sel.dataset.iso);
          searchDropdown.classList.remove('open');
        }
      } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
        searchInput.blur();
      }
    });

    searchDropdown.addEventListener('click', (e) => {
      const opt = e.target.closest('.search-option');
      if (opt) {
        this._selectCountry(opt.dataset.iso);
        this._zoomToCountry(opt.dataset.iso);
        searchInput.value = this._isoToName(opt.dataset.iso);
        searchDropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', (e) => {
      if (!this.shadowRoot.getElementById('search-container').contains(e.composedPath()[0])) {
        searchDropdown.classList.remove('open');
      }
    });
  }

  /* SLIDER TEMPORAIREMENT DÉSACTIVÉ
  _updateYearLabels() {
    this.shadowRoot.querySelectorAll('.year-label').forEach(l => {
      l.classList.toggle('active', parseInt(l.dataset.year) === this._selectedYear);
    });
  }
  */

  async _loadData() {
    const base = new URL('.', location.href).href;
    const [dataResp, topoResp] = await Promise.all([
      fetch(base + 'data.json'),
      fetch(base + 'wb_countries.topojson')
    ]);
    this._data = await dataResp.json();
    const topo = await topoResp.json();
    this._geojson = topojson.feature(topo, topo.objects.countries);
    // Land backdrop : on dissout les pays plutôt que d'utiliser
    // `topo.objects.land`. Les deux objets du fichier ne partagent aucun arc
    // (land = 132 arcs très simplifiés, countries = 1668 arcs détaillés), ce
    // qui faisait déborder le backdrop blanc dans l'océan le long des côtes
    // découpées (fjords, Sinaï, etc.). La fusion topologique garantit que le
    // contour land = union exacte des contours countries, au pixel près.
    this._landGeojson = {
      type: 'Feature',
      geometry: topojson.merge(topo, topo.objects.countries.geometries),
    };
    this._wbNames = {};
    for (const f of this._geojson.features) {
      const p = f.properties || {};
      if (p.ISO_A3 && p.NAM_0) this._wbNames[p.ISO_A3] = p.NAM_0;
    }
  }

  _initMap() {
    const container = this.shadowRoot.getElementById('map-area');
    const w = container.clientWidth;
    const h = container.clientHeight;

    this._projection = d3.geoEqualEarth()
      .fitSize([w, h], this._geojson);

    this._pathGen = d3.geoPath().projection(this._projection);

    const svg = d3.select(container)
      .insert('svg', ':first-child')
      .attr('width', w)
      .attr('height', h)
      .attr('role', 'img')
      .attr('aria-describedby', 'map-instructions')
      .style('display', 'block');

    // --- SVG pattern definitions (charte "Carte interactive Club de Paris") ---
    // Chaque catégorie = couleur de fond + bandes blanches (créditeurs) ou
    // bandes blanches espacées (débiteurs). Le sens des hachures distingue
    // créditeurs (\, diagonale droite) et débiteurs (/, diagonale gauche).
    const defs = svg.append('defs');

    const C = ClubParisMap;

    // Continuous diagonal stripes (creditors — bande blanche unique par
    // cellule, distinction par largeur de la bande).
    const mkStripes = (id, bg, stripeColor, stripeWidth, period, angle, offset) => {
      const p = defs.append('pattern').attr('id', id)
        .attr('patternUnits', 'userSpaceOnUse')
        .attr('width', period).attr('height', period)
        .attr('patternTransform', `rotate(${angle}) translate(${offset || 0}, 0)`);
      p.append('rect').attr('width', period).attr('height', period).attr('fill', bg);
      p.append('rect').attr('width', stripeWidth).attr('height', period).attr('fill', stripeColor);
      return p;
    };

    // Dashed pattern (debtors + no-data — deux tirets par cellule en quinconce).
    const mkDashes = (id, bg, dashColor, dashWidth, dashHeight, period, angle, offset) => {
      const p = defs.append('pattern').attr('id', id)
        .attr('patternUnits', 'userSpaceOnUse')
        .attr('width', period).attr('height', period)
        .attr('patternTransform', `rotate(${angle}) translate(${offset || 0}, 0)`);
      p.append('rect').attr('width', period).attr('height', period).attr('fill', bg);
      p.append('rect').attr('x', period * 0.15).attr('y', period * 0.10)
        .attr('width', dashWidth).attr('height', dashHeight).attr('fill', dashColor);
      p.append('rect').attr('x', period * 0.65).attr('y', period * 0.55)
        .attr('width', dashWidth).attr('height', dashHeight).attr('fill', dashColor);
      return p;
    };

    // 4 variantes d'offset par catégorie : `_getFill` choisit la variante via
    // un hash de l'ISO du pays. Conséquence : deux pays voisins tombent dans
    // ~75 % des cas sur des variantes différentes → cassure visible aux
    // frontières (les bandes/tirets ne sont plus alignés à travers la frontière).
    const VARIANTS = 4;
    const STRIPE_CATS = [
      // [cat, fond, stripeWidth, period]
      ['creditor-permanent',   C.CREDITOR_PERMANENT_COLOR,   1, 12], // hachures très fines
      ['creditor-adhoc',       C.CREDITOR_ADHOC_COLOR,       4, 12], // hachures medium (×4 vs permanent)
      ['creditor-prospective', C.CREDITOR_PROSPECTIVE_COLOR, 6, 14], // hachures épaisses sur fond clair
    ];
    for (const [cat, bg, sw, pd] of STRIPE_CATS) {
      for (let v = 0; v < VARIANTS; v++) {
        mkStripes(`pattern-${cat}-${v}`, bg, '#ffffff', sw, pd, 45, (v * pd) / VARIANTS);
      }
    }
    const DASH_CATS = [
      // [cat, fond, dashColor, dashWidth, dashHeight, period, angle]
      // debtor-accord (traité) : tirets fins ET denses (période 5 → ~2× plus de
      // tirets que debtor-encours pour bien distinguer les deux).
      ['debtor-accord',  C.DEBTOR_ACCORD_COLOR,  '#ffffff', 1.0, 2.5, 5, -45],
      ['debtor-encours', C.DEBTOR_ENCOURS_COLOR, '#ffffff', 2.8, 4.0, 10, -45],
      // Pays non traité (fond blanc + tirets bleus, partagé avec couche land).
      ['no-data',        '#ffffff', C.CREDITOR_PERMANENT_COLOR, 1.0, 3.5, 10, 45],
    ];
    for (const [cat, bg, color, dw, dh, pd, ang] of DASH_CATS) {
      for (let v = 0; v < VARIANTS; v++) {
        mkDashes(`pattern-${cat}-${v}`, bg, color, dw, dh, pd, ang, (v * pd) / VARIANTS);
      }
    }

    // Selection overlay: semi-transparent cross-hatching
    const pSel = defs.append('pattern').attr('id','pattern-selection')
      .attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6)
      .attr('patternTransform','rotate(45)');
    pSel.append('rect').attr('width',1.5).attr('height',6).attr('fill','rgba(15,23,42,0.35)');

    const g = svg.append('g');

    this._zoom = d3.zoom()
      .scaleExtent([1, 8])
      .translateExtent([[-Infinity, 0], [Infinity, h]])
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
        const k = event.transform.k;
        this._currentZoomK = k;
        // Maintenir un contour visuellement constant à tous les niveaux de zoom :
        // l'épaisseur SVG est divisée par k pour compenser le scale du `g`.
        g.selectAll('path.country').attr('stroke-width', 0.5 / k);
        g.selectAll('.selection-overlay').attr('stroke-width', 1.5 / k);
      });
    svg.call(this._zoom);

    const self = this;
    // Land backdrop drawn behind the country polygons. Fills gaps in disputed
    // zones (Sahara, Cachemire, Taïwan, Antarctique, etc.) en blanc pur sans
    // légende : ces zones ne sont pas une catégorie sémantique du Club de Paris
    // et ne doivent donc pas être visuellement assimilables aux pays "sans
    // antécédent" (rendus avec le pattern no-data sur fond blanc + hachures).
    if (this._landGeojson) {
      g.selectAll('path.land')
        .data([this._landGeojson])
        .join('path')
        .attr('class', 'land')
        .attr('d', this._pathGen)
        .attr('fill', '#ffffff')
        .attr('stroke', 'none')
        .attr('pointer-events', 'none');
    }
    g.selectAll('path.country')
      .data(this._geojson.features)
      .join('path')
      .attr('d', this._pathGen)
      .attr('class', 'country')
      .attr('data-id', d => d.properties.ISO_A3 || '')
      .attr('fill', d => {
        const iso = d.properties.ISO_A3;
        return iso ? this._getFill(iso) : 'url(#pattern-no-data-0)';
      })
      .attr('stroke', '#90a4ae')
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', function(event, d) {
        const iso = d.properties.ISO_A3;
        if (iso) self._selectCountry(iso);
      })
      .on('mouseenter', function(event, d) {
        const iso = d.properties.ISO_A3;
        const k = self._currentZoomK ?? 1;
        d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5 / k);
        self._showTooltip(event, iso);
      })
      .on('mousemove', function(event, d) {
        const iso = d.properties.ISO_A3;
        self._moveTooltip(event);
        if (iso === 'CHN') self._refreshChnTooltip(event);
      })
      .on('mouseleave', function() {
        const k = self._currentZoomK ?? 1;
        d3.select(this).attr('stroke', '#90a4ae').attr('stroke-width', 0.5 / k);
        self._hideTooltip();
      })
      .on('keydown', function(event) { self._onCountryKeydown(event); })
      .on('focus', function(event, d) {
        const iso = d.properties.ISO_A3;
        self._showTooltipAtElement(this, iso);
      })
      .on('blur', function() { self._hideTooltip(); });


    this._svg = svg;
    this._g = g;

    this._resizeObserver = new ResizeObserver(() => this._onResize());
    this._resizeObserver.observe(container);
  }

  _onResize() {
    const container = this.shadowRoot.getElementById('map-area');
    if (!container || !this._svg) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w < 1 || h < 1) return;

    this._projection.fitSize([w, h], this._geojson);
    this._pathGen = d3.geoPath().projection(this._projection);

    this._svg.attr('width', w).attr('height', h);
    this._g.selectAll('path.land').attr('d', this._pathGen);
    this._g.selectAll('path.country').attr('d', this._pathGen);

    this._zoom.translateExtent([[-Infinity, 0], [Infinity, h]]);
    this._svg.call(this._zoom.transform, d3.zoomIdentity);
  }

  _updateColors() {
    if (!this._g) return;
    const self = this;
    this._g.selectAll('path.country')
      .attr('fill', function() {
        const iso = d3.select(this).attr('data-id');
        return iso ? self._getFill(iso) : 'url(#pattern-no-data-0)';
      })
      .attr('stroke', '#90a4ae')
      .attr('stroke-width', 0.5 / (this._currentZoomK ?? 1));
    this._updateSelectionOverlay();
  }

  _updateSelectionOverlay() {
    this._g.selectAll('.selection-overlay').remove();
    if (!this._selectedIso) return;
    const sel = this._g.select(`path.country[data-id="${this._selectedIso}"]`);
    if (sel.empty()) return;
    const pathD = sel.attr('d');
    // Highlight selected country with a cross-hatching overlay on top
    // of its category pattern, plus a stronger stroke.
    this._g.append('path').attr('class', 'selection-overlay')
      .attr('d', pathD)
      .attr('fill', 'url(#pattern-selection)')
      .attr('stroke', '#05243a').attr('stroke-width', 1.5 / (this._currentZoomK ?? 1))
      .attr('pointer-events', 'none');
  }

  // Bbox géographique de Taïwan (intégré au polygone CHN par la WB). Quand
  // la souris survole cette zone, le tooltip CHN est préfixé de « Taïwan, ».
  static TAIWAN_BBOX = { lonMin: 119.5, lonMax: 122.5, latMin: 21.5, latMax: 25.5 };

  _isInTaiwanZone(event) {
    if (!this._projection || !this._g) return false;
    const [px, py] = d3.pointer(event, this._g.node());
    const geo = this._projection.invert([px, py]);
    if (!geo) return false;
    const [lon, lat] = geo;
    const B = ClubParisMap.TAIWAN_BBOX;
    return lon >= B.lonMin && lon <= B.lonMax && lat >= B.latMin && lat <= B.latMax;
  }

  _tooltipText(iso, opts = {}) {
    if (iso === 'CHN' && opts.taiwan) {
      // Sur la zone Taïwan, le tooltip est limité au préfixe + nom : les stats
      // de dette/créancier de la Chine continentale ne sont pas attribuables
      // sémantiquement à l'île selon la convention WB/FMI.
      return this._t('map.taiwan_prefix') + this._isoToName(iso);
    }
    const yd = this._getYearData();
    const c = yd?.countries[iso];
    let text = this._isoToName(iso);
    if (c) {
      if (c.debtor && c.debtor.total > 0) text += ` — ${this._t('map.debt')}: ${this._fmt(c.debtor.total)}`;
      if (c.creditor) text += ` — ${this._t('map.creditor_label')} (${c.creditor.nbAccords} ${this._t('map.agreements')})`;
    }
    return text;
  }

  _showTooltip(event, iso) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const taiwan = iso === 'CHN' && this._isInTaiwanZone(event);
    tip.textContent = this._tooltipText(iso, { taiwan });
    tip.style.display = 'block';
    this._moveTooltip(event);
  }

  _refreshChnTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    if (!tip || tip.style.display === 'none') return;
    const taiwan = this._isInTaiwanZone(event);
    tip.textContent = this._tooltipText('CHN', { taiwan });
  }

  _showTooltipAtElement(pathEl, iso) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    if (!tip || !area || !pathEl) return;
    tip.textContent = this._tooltipText(iso);
    tip.style.display = 'block';
    const areaRect = area.getBoundingClientRect();
    const pathRect = pathEl.getBoundingClientRect();
    tip.style.left = (pathRect.left - areaRect.left + pathRect.width / 2 + 12) + 'px';
    tip.style.top = (pathRect.top - areaRect.top - 28) + 'px';
  }

  _moveTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    const rect = area.getBoundingClientRect();
    tip.style.left = (event.clientX - rect.left + 12) + 'px';
    tip.style.top = (event.clientY - rect.top - 28) + 'px';
  }

  _hideTooltip() {
    this.shadowRoot.getElementById('tooltip').style.display = 'none';
  }

  _selectCountry(iso) {
    this._selectedIso = iso;
    this._updateColors();
    this._updatePanel();
    const panel = this.shadowRoot.getElementById('panel');
    panel.classList.add('open');
    panel.removeAttribute('inert');
    this._announce(this._t('a11y.country_selected').replace('{0}', this._isoToName(iso)));
  }

  // Zoome et recentre la viewport sur le pays cible. Utilisé après une
  // sélection depuis l'autocomplete de recherche (pas depuis un clic carte,
  // où le contexte spatial est déjà sous les yeux de l'utilisateur).
  _zoomToCountry(iso) {
    if (!this._g || !this._geojson || !this._svg || !this._pathGen) return;
    const feature = this._geojson.features.find(f => f.properties.ISO_A3 === iso);
    if (!feature) return;
    const container = this.shadowRoot.getElementById('map-area');
    if (!container) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    const bounds = this._pathGen.bounds(feature);
    const dx = bounds[1][0] - bounds[0][0];
    const dy = bounds[1][1] - bounds[0][1];
    if (!(dx > 0) || !(dy > 0)) return;
    const cx = (bounds[0][0] + bounds[1][0]) / 2;
    const cy = (bounds[0][1] + bounds[1][1]) / 2;
    // 60% du viewport occupé par le pays, borné par scaleExtent [1, 8].
    const scale = Math.max(1, Math.min(8, 0.6 / Math.max(dx / w, dy / h)));
    const tx = w / 2 - scale * cx;
    const ty = h / 2 - scale * cy;
    this._svg.transition().duration(600).call(
      this._zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  }

  _closePanel() {
    const panel = this.shadowRoot.getElementById('panel');
    panel.classList.remove('open');
    panel.setAttribute('inert', '');
    this._selectedIso = null;
    this._updateColors();
  }

  // ------- Accessible alternative: tables for the current year -------
  _buildTables() {
    const yd = this._getYearData();
    const container = this.shadowRoot.getElementById('info-tables');
    const titleEl = this.shadowRoot.getElementById('info-tables-title');
    if (!container || !titleEl || !yd) return;

    titleEl.textContent = this._t('info.tables_title').replace('{0}', this._selectedYear);

    const names = this._isoToNameMap();
    const collator = new Intl.Collator(this._lang, { sensitivity: 'base' });
    const entries = Object.entries(yd.countries);

    const creditors = entries
      .filter(([, c]) => c.creditor)
      .map(([iso, c]) => ({ iso, name: names[iso] || iso, c }))
      .sort((a, b) => collator.compare(a.name, b.name));

    const debtors = entries
      .filter(([, c]) => c.debtor && c.debtor.total > 0)
      .map(([iso, c]) => ({ iso, name: names[iso] || iso, c }))
      .sort((a, b) => collator.compare(a.name, b.name));

    const statusMap = {
      null: 'panel.status.permanent',
      undefined: 'panel.status.permanent',
      'Ad hoc': 'panel.status.ad_hoc',
      'Prospectif': 'panel.status.prospective',
    };
    const statusLabel = (s) => this._t(statusMap[s] ?? 'panel.status.permanent');

    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[ch]));

    const linkCell = (url) => url
      ? `<a href="${escapeHtml(this._localizedUrl(url))}" target="_blank" rel="noopener">${this._t('info.link_open')}<span class="sr-only"> ${this._t('info.col_link')}</span></a>`
      : '—';

    const creditorsRows = creditors.map(({ iso, name, c }) => {
      const cc = c.creditor;
      return `<tr data-name="${escapeHtml(name.toLowerCase())}">` +
        `<th scope="row">${escapeHtml(name)}</th>` +
        `<td class="num">${cc.nbAccords ?? 0}</td>` +
        `<td>${escapeHtml(statusLabel(cc.statut))}</td>` +
        `<td class="num">${cc.premiereParticipation ?? '—'}</td>` +
        `<td>${linkCell(cc.url)}</td>` +
        `</tr>`;
    }).join('');

    const debtorsRows = debtors.map(({ iso, name, c }) => {
      const d = c.debtor;
      return `<tr data-name="${escapeHtml(name.toLowerCase())}">` +
        `<th scope="row">${escapeHtml(name)}</th>` +
        `<td class="num">${this._fmt(d.apd || 0)}</td>` +
        `<td class="num">${this._fmt(d.napd || 0)}</td>` +
        `<td class="num">${this._fmt(d.total || 0)}</td>` +
        `<td>${linkCell(d.url)}</td>` +
        `</tr>`;
    }).join('');

    container.innerHTML = `
      <section class="info-table-section" data-role="creditors">
        <div class="info-table-wrap">
          <table class="info-table">
            <caption>${this._t('info.table_creditors').replace('{0}', creditors.length)}</caption>
            <thead>
              <tr>
                <th scope="col">${this._t('info.col_country')}</th>
                <th scope="col" class="num">${this._t('info.col_nb_accords')}</th>
                <th scope="col">${this._t('info.col_statut')}</th>
                <th scope="col" class="num">${this._t('info.col_premiere')}</th>
                <th scope="col">${this._t('info.col_link')}</th>
              </tr>
            </thead>
            <tbody>${creditorsRows}</tbody>
          </table>
        </div>
      </section>
      <section class="info-table-section" data-role="debtors">
        <div class="info-table-wrap">
          <table class="info-table">
            <caption>${this._t('info.table_debtors').replace('{0}', debtors.length)}</caption>
            <thead>
              <tr>
                <th scope="col">${this._t('info.col_country')}</th>
                <th scope="col" class="num">${this._t('info.col_apd')}</th>
                <th scope="col" class="num">${this._t('info.col_napd')}</th>
                <th scope="col" class="num">${this._t('info.col_total')}</th>
                <th scope="col">${this._t('info.col_link')}</th>
              </tr>
            </thead>
            <tbody>${debtorsRows}</tbody>
          </table>
        </div>
      </section>
    `;

    // Reapply the current filter (in case the user changed year while searching)
    const input = this.shadowRoot.getElementById('info-table-filter');
    if (input && input.value) this._filterTables(input.value);
  }

  _filterTables(query) {
    const sr = this.shadowRoot;
    const normalize = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const q = normalize(query.trim());
    let anyVisible = false;
    sr.querySelectorAll('.info-table tbody tr').forEach(tr => {
      if (!q) { tr.hidden = false; anyVisible = true; return; }
      const name = tr.getAttribute('data-name') || '';
      const match = normalize(name).includes(q);
      tr.hidden = !match;
      if (match) anyVisible = true;
    });
    // Hide whole section if its tbody is empty after filtering
    sr.querySelectorAll('.info-table-section').forEach(sec => {
      const anyRowVisible = [...sec.querySelectorAll('tbody tr')].some(r => !r.hidden);
      sec.hidden = q && !anyRowVisible;
    });
    const emptyEl = sr.getElementById('info-table-empty');
    if (emptyEl) emptyEl.hidden = anyVisible;
  }

  // ------- Roving tabindex on country paths (keyboard accessibility) -------
  _updateTabindex() {
    if (!this._g) return;
    const yd = this._getYearData();
    if (!yd) return;
    const names = this._isoToNameMap();
    const collator = new Intl.Collator(this._lang, { sensitivity: 'base' });
    const withData = [];
    const self = this;
    this._g.selectAll('path.country').each(function() {
      const iso = this.getAttribute('data-id');
      if (!iso) { this.removeAttribute('tabindex'); return; }
      const c = yd.countries[iso];
      if (!c) { this.removeAttribute('tabindex'); return; }
      if (self._filterMode === 'créditeur' && !c.creditor) { this.removeAttribute('tabindex'); return; }
      if (self._filterMode === 'débiteur' && !(c.debtor && c.debtor.total > 0)) { this.removeAttribute('tabindex'); return; }
      withData.push({ el: this, iso, name: names[iso] || iso });
    });
    withData.sort((a, b) => collator.compare(a.name, b.name));
    this._keyboardOrder = withData;
    withData.forEach((entry, i) => {
      entry.el.setAttribute('tabindex', i === 0 ? '0' : '-1');
    });
  }

  _onCountryKeydown(event) {
    const path = event.currentTarget;
    const iso = path.getAttribute('data-id');
    if (!iso) return;
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      this._selectCountry(iso);
      return;
    }
    if (!['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(event.key)) return;
    event.preventDefault();
    const order = this._keyboardOrder;
    if (!order || order.length === 0) return;
    const idx = order.findIndex(o => o.iso === iso);
    if (idx === -1) return;
    let next;
    if (event.key === 'Home') next = 0;
    else if (event.key === 'End') next = order.length - 1;
    else {
      const delta = (event.key === 'ArrowRight' || event.key === 'ArrowDown') ? 1 : -1;
      next = (idx + delta + order.length) % order.length;
    }
    path.setAttribute('tabindex', '-1');
    const nextEl = order[next].el;
    nextEl.setAttribute('tabindex', '0');
    nextEl.focus();
  }

  _searchCountries(query) {
    const yd = this._getYearData();
    if (!yd) return [];
    const names = this._isoToNameMap();
    const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const nQuery = normalize(query);
    const results = [];
    for (const [iso, name] of Object.entries(names)) {
      const country = yd.countries[iso];
      if (this._filterMode === 'débiteur' && !(country && country.debtor && country.debtor.total > 0)) continue;
      if (this._filterMode === 'créditeur' && !(country && country.creditor)) continue;
      const nName = normalize(name);
      const idx = nName.indexOf(nQuery);
      if (idx === -1) continue;
      const matchLen = nQuery.length;
      const highlighted = name.substring(0, idx)
        + '<span class="match">' + name.substring(idx, idx + matchLen) + '</span>'
        + name.substring(idx + matchLen);
      results.push({ iso, name, highlighted, startsWithMatch: idx === 0 });
    }
    results.sort((a, b) => {
      if (a.startsWithMatch !== b.startsWithMatch) return a.startsWithMatch ? -1 : 1;
      return a.name.localeCompare(b.name, this._lang);
    });
    return results.slice(0, 6);
  }

  // ---- Data helpers ----

  _getYearData() {
    return this._data ? this._data[String(this._selectedYear)] : null;
  }

  _getCategory(iso) {
    const yd = this._getYearData();
    if (!yd) return null;
    const c = yd.countries[iso];
    if (!c) return null;
    const isCreditor = !!c.creditor;
    const isDebtor = !!(c.debtor && c.debtor.total > 0);
    // Creditor takes precedence (dual-status countries show as creditors)
    if (isCreditor) {
      const s = c.creditor.statut;
      if (s === 'Prospectif') return 'creditor-prospective';
      if (s === 'Ad hoc')     return 'creditor-adhoc';
      return 'creditor-permanent';
    }
    if (isDebtor) {
      return c.debtor.type === 'accord' ? 'debtor-accord' : 'debtor-encours';
    }
    return null;
  }

  // Stable hash ISO → variante d'offset [0..3]. Pays voisins tombent
  // sur des variantes différentes dans ~75 % des cas, créant une cassure
  // visible des hachures au franchissement de chaque frontière.
  _isoVariant(iso) {
    if (!iso) return 0;
    let h = 0;
    for (let i = 0; i < iso.length; i++) h = (h * 31 + iso.charCodeAt(i)) | 0;
    return Math.abs(h) % 4;
  }

  _getFill(iso) {
    const v = this._isoVariant(iso);
    const cat = this._getCategory(iso);
    // Quand un filtre est actif, les pays qui ne matchent pas le filtre sont
    // peints en blanc uni — pas avec le pattern "Pays sans antécédent" qui
    // entretiendrait la confusion (un pays créancier rendu en motif "sans
    // antécédent" quand on filtre les débiteurs n'est pas sémantiquement sans
    // antécédent, juste hors-filtre).
    if (this._filterMode === 'créditeur' && !cat?.startsWith('creditor')) {
      return '#ffffff';
    }
    if (this._filterMode === 'débiteur' && !cat?.startsWith('debtor')) {
      return '#ffffff';
    }
    return `url(#pattern-${cat || 'no-data'}-${v})`;
  }

  _updatePanel() {
    const el = this.shadowRoot.getElementById('panel-content');
    if (!this._selectedIso) { el.innerHTML = ''; return; }
    const yd = this._getYearData();
    const c = yd?.countries[this._selectedIso];
    if (!c) { el.innerHTML = `<p class="no-data">${this._t('map.no_data')}</p>`; return; }

    const name = this._isoToName(this._selectedIso);
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;

    let html = `<h2 class="panel-title">${name}</h2>`;

    if (!isDebtor && !isCreditor) {
      html += `<p class="no-data">${this._t('map.no_data')}</p>`;
      el.innerHTML = html;
      return;
    }

    html += `
      <div class="info-card">
        <div class="info-icon info-icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="info-body">
          <span class="info-label">${this._t('panel.last_update')}</span>
          <span class="info-value">${this._selectedYear}</span>
        </div>
      </div>
    `;

    if (isCreditor) {
      const cr = c.creditor;
      const statusLabel = this._t(this._creditorStatusKey(cr.statut));
      const creditorTitle = this._t('panel.creditor_with_status').replace('{0}', statusLabel);
      html += `<div class="panel-section-title">${creditorTitle.toUpperCase()}</div>`;
      html += `<ul class="panel-details">`;
      html += `<li><span class="detail-label">${this._t('panel.agreements')}</span><span class="detail-value">${cr.nbAccords}</span></li>`;
      if (cr.premiereParticipation) html += `<li><span class="detail-label">${this._t('panel.member_since')}</span><span class="detail-value">${cr.premiereParticipation}</span></li>`;
      html += `</ul>`;
      if (cr.url) {
        html += `<a class="panel-cta panel-cta-creditor" href="${this._localizedUrl(cr.url)}" target="_blank" rel="noopener">${this._t('panel.creditor_link')}</a>`;
      }
    }

    if (isDebtor) {
      const d = c.debtor;
      html += `<div class="panel-section-title">${this._t('panel.section_debtor').toUpperCase()}</div>`;
      html += `
        <div class="info-card">
          <div class="info-icon info-icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.apd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.apd)}</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon info-icon-orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.napd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.napd)}</span>
          </div>
        </div>
      `;
      if (d.url) {
        html += `<a class="panel-cta" href="${this._localizedUrl(d.url)}" target="_blank" rel="noopener">${this._t('panel.debtor_link')}</a>`;
      }
    }

    el.innerHTML = html;
  }

  _creditorStatusKey(statut) {
    if (statut === 'Ad hoc') return 'panel.status.ad_hoc';
    if (statut === 'Prospectif') return 'panel.status.prospective';
    return 'panel.status.permanent';
  }

  _localizedUrl(url) {
    if (this._lang !== 'en' || !url) return url;
    return url.replace('clubdeparis.org/', 'clubdeparis.org/en/');
  }

  _fmt(val) {
    const m = Math.round(val / 1e6);
    if (m === 0) return '0 \u0024';
    if (m >= 1000) return `${(m / 1000).toLocaleString('fr-FR', { minimumFractionDigits: 3, maximumFractionDigits: 3 })} Md\u0024`;
    return `${m.toLocaleString('fr-FR')} M\u0024`;
  }

  _fmtPanel(val) {
    const m = Math.round(val / 1e6);
    if (m === 0) return '0 \u0024';
    if (m >= 1000) {
      const mds = (m / 1000).toLocaleString('fr-FR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
      return `${mds} milliards \u0024`;
    }
    return `${m.toLocaleString('fr-FR')} millions \u0024`;
  }

        transition: transform 0.15s;
        display: inline-block;
      }
      .info-row[open] .info-chevron { transform: rotate(90deg); color: #c2410c; }
      .info-row[open] > summary { color: #1e293b; }
      .info-content {
        margin-top: 0.6rem;
        padding: 0.6rem 0.75rem;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 2px;
        font-size: 0.78rem;
        color: #475569;
        line-height: 1.55;
      }
      .info-content p { margin: 0 0 0.4rem; }
      .info-content p:last-child { margin-bottom: 0; }
      .info-content a { color: #c2410c; }
      .info-content a:hover, .info-content a:focus-visible { color: #9a3412; }
      .info-desc { margin-bottom: 0.75rem; }
      .info-dl-title {
        font-weight: 700;
        color: #1e293b;
        font-size: 0.78rem;
        margin-top: 0.25rem;
        margin-bottom: 0.2rem;
      }
      .info-dl-note { margin: 0 0 0.4rem; font-size: 0.73rem; color: #475569; }
      .info-dl-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.15rem 0.75rem;
      }
      .info-dl-list li { padding: 0.15rem 0; }
      .info-dl-list a {
        text-decoration: none;
        font-size: 0.76rem;
        color: #c2410c;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .info-dl-list a::before {
        content: '⬇';
        color: #6b7280;
        font-size: 0.8rem;
      }
      .info-dl-list a:hover,
      .info-dl-list a:focus-visible {
        text-decoration: underline;
        color: #9a3412;
      }
      .info-dl-list a:hover::before,
      .info-dl-list a:focus-visible::before { color: #c2410c; }

      /* ---- Accordion tables (accessible alternative to the map) ---- */
      .info-tables-title {
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #1e293b;
        margin: 1.25rem 0 0.5rem;
      }
      .info-tables-search { margin-bottom: 0.5rem; }
      .info-table-filter-input {
        width: 100%;
        padding: 0.4rem 0.6rem;
        border: 1px solid #6b7280;
        border-radius: 2px;
        font-size: 0.8rem;
        font-family: inherit;
        color: #1e293b;
        background: #fff;
        box-sizing: border-box;
      }
      .info-table-filter-input:focus-visible {
        outline: 2px solid #c2410c;
        outline-offset: 1px;
        border-color: #c2410c;
      }
      .info-table-section { margin-top: 0.75rem; }
      .info-table-section h4 {
        margin: 0 0 0.35rem;
        font-size: 0.78rem;
        font-weight: 600;
        color: #1e293b;
      }
      .info-table-wrap {
        overflow-x: auto;
        border: 1px solid #e2e8f0;
        border-radius: 2px;
        background: #fff;
      }
      table.info-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.74rem;
        color: #1e293b;
      }
      table.info-table caption {
        text-align: left;
        font-size: 0.76rem;
        font-weight: 600;
        padding: 0.4rem 0.6rem 0.3rem;
        color: #1e293b;
        background: #f1f5f9;
        border-bottom: 1px solid #e2e8f0;
      }
      table.info-table th,
      table.info-table td {
        padding: 0.35rem 0.6rem;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
      }
      table.info-table th {
        font-weight: 600;
        color: #475569;
        background: #f8fafc;
        position: sticky;
        top: 0;
      }
      table.info-table td.num, table.info-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
      table.info-table tr:last-child td { border-bottom: none; }
      table.info-table tr[hidden] { display: none; }
      table.info-table a {
        color: #c2410c;
        text-decoration: none;
        font-size: 0.72rem;
      }
      table.info-table a:hover, table.info-table a:focus-visible {
        text-decoration: underline;
        color: #9a3412;
      }
      .info-table-section[hidden] { display: none; }

      /* ---- LOADING ---- */
      .loading-overlay {
        position: absolute; inset: 0; z-index: 700;
        background: rgba(192,89,58,.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0.75rem;
        font-size: 0.9rem; color: #fff;
      }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,.3); border-top-color: #fff;
        border-radius: 50%; animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ---- RESPONSIVE ---- */
      @container wrapper (max-width: 700px) {
        .filter-row { row-gap: 0.4rem; }
        .search-input { width: 160px; }
        .search-input:focus { width: 200px; }
        .panel { width: 280px; }
        /* .year-label { font-size: 0.55rem; } SLIDER DÉSACTIVÉ */
      }

      @container wrapper (max-width: 480px) {
        .filter-row { gap: 0.35rem; row-gap: 0.4rem; }
        .filter-label { font-size: 0.78rem; }
        .filter-btn { padding: 0.25rem 0.55rem; font-size: 0.75rem; }
        .search-input { width: 140px; }
        .search-input:focus { width: 180px; }
        .panel { width: 100%; max-width: 100%; }
        .panel-title { font-size: 1.2rem; }
        .info-value { font-size: 0.95rem; }
        /* .year-label { font-size: 0.5rem; padding: 0.1rem 0.1rem; } SLIDER DÉSACTIVÉ */
      }

      @media (max-width: 700px) {
        .filter-row { row-gap: 0.4rem; }
        .search-input { width: 160px; }
        .panel { width: 280px; }
        /* .year-label { font-size: 0.55rem; } SLIDER DÉSACTIVÉ */
      }
      @media (max-width: 480px) {
        .filter-row { gap: 0.35rem; row-gap: 0.4rem; }
        .filter-label { font-size: 0.78rem; }
        .filter-btn { padding: 0.25rem 0.55rem; font-size: 0.75rem; }
        .search-input { width: 140px; }
        .panel { width: 100%; max-width: 100%; }
        .panel-title { font-size: 1.2rem; }
        .info-value { font-size: 0.95rem; }
        /* .year-label { font-size: 0.5rem; padding: 0.1rem 0.1rem; } SLIDER DÉSACTIVÉ */
      }
    `;
  }
}

customElements.define('club-paris-map', ClubParisMap);
</script>
