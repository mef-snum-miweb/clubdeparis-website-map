// ---------------------------------------------------------------------------

class ClubParisMap extends HTMLElement {
  static CREDITOR_PERMANENT_COLOR = '#1e40af';
  static CREDITOR_ADHOC_COLOR = '#93c5fd';
  static DEBTOR_ACCORD_COLOR = '#f97316';
  static DEBTOR_ENCOURS_COLOR = '#fdba74';
  static DEFAULT_COLOR = '#e8c4b0';

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._data = null;
    this._selectedYear = 2024;
    this._filterMode = 'all';
    this._renderMode = 'colors';
    this._selectedIso = null;
    this._geojson = null;
    this._projection = null;
    this._pathGen = null;
    this._zoom = null;
    this._lang = 'fr';
  }

  _detectLang() {
    const attr = this.getAttribute('lang');
    if (attr === 'en') return 'en';
    if (attr === 'fr') return 'fr';
    const params = new URLSearchParams(window.location.search);
    const p = params.get('lang');
    if (p === 'en') return 'en';
    if (p === 'fr') return 'fr';
    const html = document.documentElement.lang?.toLowerCase() ?? '';
    if (html.startsWith('en')) return 'en';
    return 'fr';
  }

  _t(key) {
    return TRANSLATIONS[this._lang][key] ?? TRANSLATIONS.fr[key] ?? key;
  }

  _isoToName(iso) {
    return COUNTRY_NAMES[this._lang][iso] || iso;
  }

  _isoToNameMap() {
    return COUNTRY_NAMES[this._lang];
  }

            <span class="map-meta-sep" aria-hidden="true">·</span>

  async _setup() {
    // this._buildYearLabels(); // SLIDER TEMPORAIREMENT DÉSACTIVÉ
    this._bindEvents();
    this._updateMapHeader();
    await this._loadData();
    this._initMap();
    this._updateMapA11yLabel();
    this._updateTabindex();
    this._buildTables();
    this.shadowRoot.getElementById('loading').style.display = 'none';
  }

  _updateMapHeader() {
    const el = this.shadowRoot.getElementById('map-title');
    if (!el) return;
    el.textContent = `${this._t('header.title')} — ${this._selectedYear}`;
  }

  _updateMapA11yLabel() {
    if (!this._svg) return;
    const label = this._t('a11y.map_label').replace('{0}', this._selectedYear);
    this._svg.attr('aria-label', label);
  }

  _announce(msg) {
    const el = this.shadowRoot.getElementById('sr-announce');
    if (!el) return;
    // Clear first so assistive tech re-announces the same message.
    el.textContent = '';
    setTimeout(() => { el.textContent = msg; }, 30);
  }

  _bindEvents() {
    const sr = this.shadowRoot;
    sr.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._filterMode = btn.dataset.filter;
        this._updateColors();
        this._updateTabindex();
      });
    });
    const wrapper = sr.querySelector('.wrapper');
    sr.querySelectorAll('.render-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this._renderMode = btn.dataset.render;
        sr.querySelectorAll('.render-btn').forEach(b => {
          const on = b === btn;
          b.classList.toggle('active', on);
          b.setAttribute('aria-checked', on ? 'true' : 'false');
        });
        wrapper.dataset.render = this._renderMode;
        this._updateColors();
      });
    });
    /* SLIDER TEMPORAIREMENT DÉSACTIVÉ
    const slider = sr.getElementById('year-slider');
    slider.addEventListener('input', () => {
      this._selectedYear = parseInt(slider.value);
      this._onYearChanged();
    });
    sr.getElementById('year-labels').addEventListener('click', (e) => {
      if (e.target.dataset.year) {
        this._selectedYear = parseInt(e.target.dataset.year);
        slider.value = this._selectedYear;
        this._onYearChanged();
      }
    });
    */

    // Accordion table filter
    const tableFilter = sr.getElementById('info-table-filter');
    if (tableFilter) {
      tableFilter.addEventListener('input', () => {
        this._filterTables(tableFilter.value);
      });
    }
    sr.getElementById('panel-close').addEventListener('click', () => this._closePanel());

    // Skip link → open the a11y disclosure row and focus its summary
    const skipLink = sr.getElementById('skip-link');
    const infoRow = sr.getElementById('info-row');
    if (skipLink && infoRow) {
      skipLink.addEventListener('click', (e) => {
        e.preventDefault();
        infoRow.open = true;
        const summary = infoRow.querySelector('summary');
        if (summary) {
          summary.focus();
          summary.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      });
    }

    // Search autocomplete
    const searchInput = sr.getElementById('search-input');
    const searchDropdown = sr.getElementById('search-dropdown');
    let activeIdx = -1;

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) { searchDropdown.classList.remove('open'); return; }
      const results = this._searchCountries(query);
      activeIdx = -1;
      if (results.length === 0) {
        searchDropdown.innerHTML = `<div class="search-no-result">${this._t('search.no_result')}</div>`;
      } else {
        searchDropdown.innerHTML = results.map((r, i) =>
          `<div class="search-option" data-iso="${r.iso}" data-index="${i}">${r.highlighted}</div>`
        ).join('');
      }
      searchDropdown.classList.add('open');
    });

    searchInput.addEventListener('keydown', (e) => {
      const options = searchDropdown.querySelectorAll('.search-option');
      if (!options.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, options.length - 1);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        options.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        options[activeIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const sel = activeIdx >= 0 ? options[activeIdx] : options[0];
        if (sel) {
          this._selectCountry(sel.dataset.iso);
          searchInput.value = this._isoToName(sel.dataset.iso);
          searchDropdown.classList.remove('open');
        }
      } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
        searchInput.blur();
      }
    });

    searchDropdown.addEventListener('click', (e) => {
      const opt = e.target.closest('.search-option');
      if (opt) {
        this._selectCountry(opt.dataset.iso);
        searchInput.value = this._isoToName(opt.dataset.iso);
        searchDropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', (e) => {
      if (!this.shadowRoot.getElementById('search-container').contains(e.composedPath()[0])) {
        searchDropdown.classList.remove('open');
      }
    });
  }

  async _loadData() {
    const base = new URL('.', location.href).href;
    const [dataResp, topoResp] = await Promise.all([
      fetch(base + 'data.json'),
      fetch(base + 'wb_countries.topojson')
    ]);
    this._data = await dataResp.json();
    const topo = await topoResp.json();
    this._geojson = topojson.feature(topo, topo.objects.countries);
  }

  _initMap() {
    const container = this.shadowRoot.getElementById('map-area');
    const w = container.clientWidth;
    const h = container.clientHeight;

    this._projection = d3.geoEqualEarth()
      .fitSize([w, h], this._geojson);

    this._pathGen = d3.geoPath().projection(this._projection);

    const svg = d3.select(container)
      .insert('svg', ':first-child')
      .attr('width', w)
      .attr('height', h)
      .attr('role', 'img')
      .attr('aria-describedby', 'map-instructions')
      .style('display', 'block');

    // --- SVG pattern definitions ---
    // 4 category patterns (renderMode === 'patterns') + 1 selection overlay
    const defs = svg.append('defs');

    // Debtor with agreement: diagonal stripes \ (dense, dark orange)
    const pDA = defs.append('pattern').attr('id','pattern-debtor-accord')
      .attr('patternUnits','userSpaceOnUse').attr('width',8).attr('height',8)
      .attr('patternTransform','rotate(45)');
    pDA.append('rect').attr('width',8).attr('height',8).attr('fill','#fde8d9');
    pDA.append('rect').attr('width',1.8).attr('height',8).attr('fill','#f97316');

    // Debtor without agreement: diagonal stripes / (sparse, light orange)
    const pDE = defs.append('pattern').attr('id','pattern-debtor-encours')
      .attr('patternUnits','userSpaceOnUse').attr('width',10).attr('height',10)
      .attr('patternTransform','rotate(-45)');
    pDE.append('rect').attr('width',10).attr('height',10).attr('fill','#fff7ed');
    pDE.append('rect').attr('width',1.4).attr('height',10).attr('fill','#fdba74');

    // Permanent creditor: large dots (dark blue)
    const pCP = defs.append('pattern').attr('id','pattern-creditor-permanent')
      .attr('patternUnits','userSpaceOnUse').attr('width',8).attr('height',8);
    pCP.append('rect').attr('width',8).attr('height',8).attr('fill','#eff6ff');
    pCP.append('circle').attr('cx',4).attr('cy',4).attr('r',1.4).attr('fill','#1e40af');

    // Ad hoc creditor: small dots (light blue)
    const pCA = defs.append('pattern').attr('id','pattern-creditor-adhoc')
      .attr('patternUnits','userSpaceOnUse').attr('width',10).attr('height',10);
    pCA.append('rect').attr('width',10).attr('height',10).attr('fill','#f0f9ff');
    pCA.append('circle').attr('cx',5).attr('cy',5).attr('r',1.0).attr('fill','#3b82f6');

    // Selection overlay: semi-transparent cross-hatching
    const pSel = defs.append('pattern').attr('id','pattern-selection')
      .attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6)
      .attr('patternTransform','rotate(45)');
    pSel.append('rect').attr('width',1.5).attr('height',6).attr('fill','rgba(15,23,42,0.35)');

    const g = svg.append('g');

    this._zoom = d3.zoom()
      .scaleExtent([1, 8])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(this._zoom);

    const self = this;
    g.selectAll('path')
      .data(this._geojson.features)
      .join('path')
      .attr('d', this._pathGen)
      .attr('class', 'country')
      .attr('data-id', d => d.properties.ISO_A3 || '')
      .attr('fill', d => {
        const iso = d.properties.ISO_A3;
        return iso ? this._getFill(iso) : '#e8c4b0';
      })
      .attr('stroke', '#90a4ae')
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', function(event, d) {
        const iso = d.properties.ISO_A3;
        if (iso) self._selectCountry(iso);
      })
      .on('mouseenter', function(event, d) {
        const iso = d.properties.ISO_A3;
        d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5);
        self._showTooltip(event, iso, d);
      })
      .on('mousemove', function(event) {
        self._moveTooltip(event);
      })
      .on('mouseleave', function() {
        d3.select(this).attr('stroke', '#90a4ae').attr('stroke-width', 0.5);
        self._hideTooltip();
      })
      .on('keydown', function(event) { self._onCountryKeydown(event); })
      .on('focus', function(event, d) {
        const iso = d.properties.ISO_A3;
        self._showTooltipAtElement(this, iso, d);
      })
      .on('blur', function() { self._hideTooltip(); });

    this._svg = svg;
    this._g = g;

    this._resizeObserver = new ResizeObserver(() => this._onResize());
    this._resizeObserver.observe(container);
  }

  _onResize() {
    const container = this.shadowRoot.getElementById('map-area');
    if (!container || !this._svg) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w < 1 || h < 1) return;

    this._projection.fitSize([w, h], this._geojson);
    this._pathGen = d3.geoPath().projection(this._projection);

    this._svg.attr('width', w).attr('height', h);
    this._g.selectAll('path.country').attr('d', this._pathGen);

    this._svg.call(this._zoom.transform, d3.zoomIdentity);
  }

  _updateColors() {
    if (!this._g) return;
    const self = this;
    this._g.selectAll('path.country')
      .attr('fill', function() {
        const iso = d3.select(this).attr('data-id');
        return iso ? self._getFill(iso) : '#e8c4b0';
      })
      .attr('stroke', '#90a4ae')
      .attr('stroke-width', 0.5);
    this._updateSelectionOverlay();
  }

  _updateSelectionOverlay() {
    this._g.selectAll('.selection-overlay').remove();
    if (!this._selectedIso) return;
    const sel = this._g.select(`path.country[data-id="${this._selectedIso}"]`);
    if (sel.empty()) return;
    const pathD = sel.attr('d');
    const cat = this._getCategory(this._selectedIso);
    if (this._renderMode === 'patterns') {
      // Pattern mode → solid color fill on selected country
      this._g.append('path').attr('class', 'selection-overlay')
        .attr('d', pathD)
        .attr('fill', this._categorySolidColor(cat))
        .attr('stroke', '#1e293b').attr('stroke-width', 1.5)
        .attr('pointer-events', 'none');
    } else {
      // Color mode → cross-hatching overlay on selected country
      this._g.append('path').attr('class', 'selection-overlay')
        .attr('d', pathD)
        .attr('fill', 'url(#pattern-selection)')
        .attr('stroke', '#1e293b').attr('stroke-width', 1.5)
        .attr('pointer-events', 'none');
    }
  }

  _tooltipText(iso, d) {
    const yd = this._getYearData();
    const c = yd?.countries[iso];
    const name = this._isoToName(iso) || d?.properties?.name || iso;
    let text = name;
    if (c) {
      if (c.debtor && c.debtor.total > 0) text += ` — ${this._t('map.debt')}: ${this._fmt(c.debtor.total)}`;
      if (c.creditor) text += ` — ${this._t('map.creditor_label')} (${c.creditor.nbAccords} ${this._t('map.agreements')})`;
    }
    return text;
  }

  _showTooltip(event, iso, d) {
    const tip = this.shadowRoot.getElementById('tooltip');
    tip.textContent = this._tooltipText(iso, d);
    tip.style.display = 'block';
    this._moveTooltip(event);
  }

  _showTooltipAtElement(pathEl, iso, d) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    if (!tip || !area || !pathEl) return;
    tip.textContent = this._tooltipText(iso, d);
    tip.style.display = 'block';
    const areaRect = area.getBoundingClientRect();
    const pathRect = pathEl.getBoundingClientRect();
    tip.style.left = (pathRect.left - areaRect.left + pathRect.width / 2 + 12) + 'px';
    tip.style.top = (pathRect.top - areaRect.top - 28) + 'px';
  }

  _moveTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    const rect = area.getBoundingClientRect();
    tip.style.left = (event.clientX - rect.left + 12) + 'px';
    tip.style.top = (event.clientY - rect.top - 28) + 'px';
  }

  _hideTooltip() {
    this.shadowRoot.getElementById('tooltip').style.display = 'none';
  }

  _selectCountry(iso) {
    this._selectedIso = iso;
    this._updateColors();
    this._updatePanel();
    const panel = this.shadowRoot.getElementById('panel');
    panel.classList.add('open');
    panel.removeAttribute('inert');
    const name = this._isoToName(iso) || iso;
    this._announce(this._t('a11y.country_selected').replace('{0}', name));
  }

  _closePanel() {
    const panel = this.shadowRoot.getElementById('panel');
    panel.classList.remove('open');
    panel.setAttribute('inert', '');
    this._selectedIso = null;
    this._updateColors();
  }

  // ------- Accessible alternative: tables for the current year -------
  _buildTables() {
    const yd = this._getYearData();
    const container = this.shadowRoot.getElementById('info-tables');
    const titleEl = this.shadowRoot.getElementById('info-tables-title');
    if (!container || !titleEl || !yd) return;

    titleEl.textContent = this._t('info.tables_title').replace('{0}', this._selectedYear);

    const names = this._isoToNameMap();
    const collator = new Intl.Collator(this._lang, { sensitivity: 'base' });
    const entries = Object.entries(yd.countries);

    const creditors = entries
      .filter(([, c]) => c.creditor)
      .map(([iso, c]) => ({ iso, name: names[iso] || c.country || iso, c }))
      .sort((a, b) => collator.compare(a.name, b.name));

    const debtors = entries
      .filter(([, c]) => c.debtor && c.debtor.total > 0)
      .map(([iso, c]) => ({ iso, name: names[iso] || c.country || iso, c }))
      .sort((a, b) => collator.compare(a.name, b.name));

    const statusMap = {
      null: 'panel.status.permanent',
      undefined: 'panel.status.permanent',
      'Ad hoc': 'panel.status.ad_hoc',
      'Prospectif': 'panel.status.prospective',
    };
    const statusLabel = (s) => this._t(statusMap[s] ?? 'panel.status.permanent');

    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[ch]));

    const linkCell = (url) => url
      ? `<a href="${escapeHtml(this._localizedUrl(url))}" target="_blank" rel="noopener">${this._t('info.link_open')}<span class="sr-only"> ${this._t('info.col_link')}</span></a>`
      : '—';

    const creditorsRows = creditors.map(({ iso, name, c }) => {
      const cc = c.creditor;
      return `<tr data-name="${escapeHtml(name.toLowerCase())}">` +
        `<th scope="row">${escapeHtml(name)}</th>` +
        `<td class="num">${cc.nbAccords ?? 0}</td>` +
        `<td>${escapeHtml(statusLabel(cc.statut))}</td>` +
        `<td class="num">${cc.premiereParticipation ?? '—'}</td>` +
        `<td>${linkCell(cc.url)}</td>` +
        `</tr>`;
    }).join('');

    const debtorsRows = debtors.map(({ iso, name, c }) => {
      const d = c.debtor;
      return `<tr data-name="${escapeHtml(name.toLowerCase())}">` +
        `<th scope="row">${escapeHtml(name)}</th>` +
        `<td class="num">${this._fmt(d.apd || 0)}</td>` +
        `<td class="num">${this._fmt(d.napd || 0)}</td>` +
        `<td class="num">${this._fmt(d.total || 0)}</td>` +
        `<td>${linkCell(d.url)}</td>` +
        `</tr>`;
    }).join('');

    container.innerHTML = `
      <section class="info-table-section" data-role="creditors">
        <div class="info-table-wrap">
          <table class="info-table">
            <caption>${this._t('info.table_creditors').replace('{0}', creditors.length)}</caption>
            <thead>
              <tr>
                <th scope="col">${this._t('info.col_country')}</th>
                <th scope="col" class="num">${this._t('info.col_nb_accords')}</th>
                <th scope="col">${this._t('info.col_statut')}</th>
                <th scope="col" class="num">${this._t('info.col_premiere')}</th>
                <th scope="col">${this._t('info.col_link')}</th>
              </tr>
            </thead>
            <tbody>${creditorsRows}</tbody>
          </table>
        </div>
      </section>
      <section class="info-table-section" data-role="debtors">
        <div class="info-table-wrap">
          <table class="info-table">
            <caption>${this._t('info.table_debtors').replace('{0}', debtors.length)}</caption>
            <thead>
              <tr>
                <th scope="col">${this._t('info.col_country')}</th>
                <th scope="col" class="num">${this._t('info.col_apd')}</th>
                <th scope="col" class="num">${this._t('info.col_napd')}</th>
                <th scope="col" class="num">${this._t('info.col_total')}</th>
                <th scope="col">${this._t('info.col_link')}</th>
              </tr>
            </thead>
            <tbody>${debtorsRows}</tbody>
          </table>
        </div>
      </section>
    `;

    // Reapply the current filter (in case the user changed year while searching)
    const input = this.shadowRoot.getElementById('info-table-filter');
    if (input && input.value) this._filterTables(input.value);
  }

  _filterTables(query) {
    const sr = this.shadowRoot;
    const normalize = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const q = normalize(query.trim());
    let anyVisible = false;
    sr.querySelectorAll('.info-table tbody tr').forEach(tr => {
      if (!q) { tr.hidden = false; anyVisible = true; return; }
      const name = tr.getAttribute('data-name') || '';
      const match = normalize(name).includes(q);
      tr.hidden = !match;
      if (match) anyVisible = true;
    });
    // Hide whole section if its tbody is empty after filtering
    sr.querySelectorAll('.info-table-section').forEach(sec => {
      const anyRowVisible = [...sec.querySelectorAll('tbody tr')].some(r => !r.hidden);
      sec.hidden = q && !anyRowVisible;
    });
    const emptyEl = sr.getElementById('info-table-empty');
    if (emptyEl) emptyEl.hidden = anyVisible;
  }

  // ------- Roving tabindex on country paths (keyboard accessibility) -------
  _updateTabindex() {
    if (!this._g) return;
    const yd = this._getYearData();
    if (!yd) return;
    const names = this._isoToNameMap();
    const collator = new Intl.Collator(this._lang, { sensitivity: 'base' });
    const withData = [];
    const self = this;
    this._g.selectAll('path.country').each(function() {
      const iso = this.getAttribute('data-id');
      if (!iso) { this.removeAttribute('tabindex'); return; }
      const c = yd.countries[iso];
      if (!c) { this.removeAttribute('tabindex'); return; }
      if (self._filterMode === 'créditeur' && !c.creditor) { this.removeAttribute('tabindex'); return; }
      if (self._filterMode === 'débiteur' && !(c.debtor && c.debtor.total > 0)) { this.removeAttribute('tabindex'); return; }
      withData.push({ el: this, iso, name: names[iso] || iso });
    });
    withData.sort((a, b) => collator.compare(a.name, b.name));
    this._keyboardOrder = withData;
    withData.forEach((entry, i) => {
      entry.el.setAttribute('tabindex', i === 0 ? '0' : '-1');
    });
  }

  _onCountryKeydown(event) {
    const path = event.currentTarget;
    const iso = path.getAttribute('data-id');
    if (!iso) return;
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      this._selectCountry(iso);
      return;
    }
    if (!['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(event.key)) return;
    event.preventDefault();
    const order = this._keyboardOrder;
    if (!order || order.length === 0) return;
    const idx = order.findIndex(o => o.iso === iso);
    if (idx === -1) return;
    let next;
    if (event.key === 'Home') next = 0;
    else if (event.key === 'End') next = order.length - 1;
    else {
      const delta = (event.key === 'ArrowRight' || event.key === 'ArrowDown') ? 1 : -1;
      next = (idx + delta + order.length) % order.length;
    }
    path.setAttribute('tabindex', '-1');
    const nextEl = order[next].el;
    nextEl.setAttribute('tabindex', '0');
    nextEl.focus();
  }

  _searchCountries(query) {
    const yd = this._getYearData();
    if (!yd) return [];
    const names = this._isoToNameMap();
    const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    const nQuery = normalize(query);
    const results = [];
    for (const [iso, name] of Object.entries(names)) {
      const country = yd.countries[iso];
      if (this._filterMode === 'débiteur' && !(country && country.debtor && country.debtor.total > 0)) continue;
      if (this._filterMode === 'créditeur' && !(country && country.creditor)) continue;
      const nName = normalize(name);
      const idx = nName.indexOf(nQuery);
      if (idx === -1) continue;
      const matchLen = nQuery.length;
      const highlighted = name.substring(0, idx)
        + '<span class="match">' + name.substring(idx, idx + matchLen) + '</span>'
        + name.substring(idx + matchLen);
      results.push({ iso, name, highlighted, startsWithMatch: idx === 0 });
    }
    results.sort((a, b) => {
      if (a.startsWithMatch !== b.startsWithMatch) return a.startsWithMatch ? -1 : 1;
      return a.name.localeCompare(b.name, this._lang);
    });
    return results.slice(0, 6);
  }

  // ---- Data helpers ----

  _getYearData() {
    return this._data ? this._data[String(this._selectedYear)] : null;
  }

  _getCategory(iso) {
    const yd = this._getYearData();
    if (!yd) return null;
    const c = yd.countries[iso];
    if (!c) return null;
    const isCreditor = !!c.creditor;
    const isDebtor = !!(c.debtor && c.debtor.total > 0);
    // Creditor takes precedence (dual-status countries show as creditors)
    if (isCreditor) {
      return c.creditor.statut ? 'creditor-adhoc' : 'creditor-permanent';
    }
    if (isDebtor) {
      return c.debtor.type === 'accord' ? 'debtor-accord' : 'debtor-encours';
    }
    return null;
  }

  _categoryFill(cat) {
    const C = ClubParisMap;
    if (this._renderMode === 'patterns') {
      return cat ? `url(#pattern-${cat})` : C.DEFAULT_COLOR;
    }
    switch (cat) {
      case 'creditor-permanent': return C.CREDITOR_PERMANENT_COLOR;
      case 'creditor-adhoc':     return C.CREDITOR_ADHOC_COLOR;
      case 'debtor-accord':      return C.DEBTOR_ACCORD_COLOR;
      case 'debtor-encours':     return C.DEBTOR_ENCOURS_COLOR;
      default:                   return C.DEFAULT_COLOR;
    }
  }

  _categorySolidColor(cat) {
    const C = ClubParisMap;
    switch (cat) {
      case 'creditor-permanent': return C.CREDITOR_PERMANENT_COLOR;
      case 'creditor-adhoc':     return C.CREDITOR_ADHOC_COLOR;
      case 'debtor-accord':      return C.DEBTOR_ACCORD_COLOR;
      case 'debtor-encours':     return C.DEBTOR_ENCOURS_COLOR;
      default:                   return C.DEFAULT_COLOR;
    }
  }

  _getFill(iso) {
    const cat = this._getCategory(iso);
    if (this._filterMode === 'créditeur') {
      return cat?.startsWith('creditor') ? this._categoryFill(cat) : ClubParisMap.DEFAULT_COLOR;
    }
    if (this._filterMode === 'débiteur') {
      return cat?.startsWith('debtor') ? this._categoryFill(cat) : ClubParisMap.DEFAULT_COLOR;
    }
    return this._categoryFill(cat);
  }

  _updatePanel() {
    const el = this.shadowRoot.getElementById('panel-content');
    if (!this._selectedIso) { el.innerHTML = ''; return; }
    const yd = this._getYearData();
    const c = yd?.countries[this._selectedIso];
    if (!c) { el.innerHTML = `<p class="no-data">${this._t('map.no_data')}</p>`; return; }

    const name = this._isoToName(this._selectedIso) || c.country;
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;

    let html = `<h2 class="panel-title">${name}</h2>`;

    html += `
      <div class="info-card">
        <div class="info-icon info-icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="info-body">
          <span class="info-label">${this._t('panel.last_update')}</span>
          <span class="info-value">${this._selectedYear}</span>
        </div>
      </div>
    `;

    if (isCreditor) {
      const cr = c.creditor;
      const statusLabel = this._t(this._creditorStatusKey(cr.statut));
      const creditorTitle = this._t('panel.creditor_with_status').replace('{0}', statusLabel);
      html += `<div class="panel-section-title">${creditorTitle.toUpperCase()}</div>`;
      html += `<ul class="panel-details">`;
      html += `<li><span class="detail-label">${this._t('panel.agreements')}</span><span class="detail-value">${cr.nbAccords}</span></li>`;
      if (cr.premiereParticipation) html += `<li><span class="detail-label">${this._t('panel.member_since')}</span><span class="detail-value">${cr.premiereParticipation}</span></li>`;
      html += `</ul>`;
      if (cr.url) {
        html += `<a class="panel-cta panel-cta-creditor" href="${this._localizedUrl(cr.url)}" target="_blank" rel="noopener">${this._t('panel.creditor_link')}</a>`;
      }
    }

    if (isDebtor) {
      const d = c.debtor;
      html += `<div class="panel-section-title">${this._t('panel.section_debtor').toUpperCase()}</div>`;
      html += `
        <div class="info-card">
          <div class="info-icon info-icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.apd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.apd)}</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon info-icon-orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="info-body">
            <span class="info-label">${this._t('panel.napd_label')}</span>
            <span class="info-value">${this._fmtPanel(d.napd)}</span>
          </div>
        </div>
      `;
      if (d.url) {
        html += `<a class="panel-cta" href="${this._localizedUrl(d.url)}" target="_blank" rel="noopener">${this._t('panel.debtor_link')}</a>`;
      }
    }

    el.innerHTML = html;
  }

  _creditorStatusKey(statut) {
    if (statut === 'Ad hoc') return 'panel.status.ad_hoc';
    if (statut === 'Prospectif') return 'panel.status.prospective';
    return 'panel.status.permanent';
  }

  _localizedUrl(url) {
    if (this._lang !== 'en' || !url) return url;
    return url.replace('clubdeparis.org/', 'clubdeparis.org/en/');
  }

  _fmt(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(2)} Md\u20AC`;
    if (val >= 1e6) return `${(val / 1e6).toFixed(1)} M\u20AC`;
    if (val === 0) return '0 \u20AC';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' \u20AC';
  }

  _fmtPanel(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} milliards \u20AC`;
    if (val >= 1e6) return `${Math.round(val / 1e6).toLocaleString('fr-FR')} millions \u20AC`;
    if (val === 0) return '0 \u20AC';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' \u20AC';
  }

      .year-label {
        background: none; border: none; font-size: 0.68rem;
        color: #64748b; cursor: pointer; padding: 0.15rem 0.25rem;
        border-radius: 4px; transition: all .15s; font-family: inherit;
      }
      .year-label:hover { color: #c2410c; background: #fff7ed; }
      .year-label.active { color: #c2410c; font-weight: 700; }
      */

      /* Info row — a11y description + download links, compact discreet disclosure */
      .info-row {
        margin-top: 0.5rem;
        padding-top: 0.45rem;
        border-top: 1px solid #e2e8f0;
      }
      .info-row > summary {
        list-style: none;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        color: #475569;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.15rem 0.25rem;
        border-radius: 4px;
        user-select: none;
        outline-offset: 2px;
      }
      .info-row > summary::-webkit-details-marker { display: none; }
      .info-row > summary:hover { color: #1e293b; }
      .info-row > summary:focus-visible {
        outline: 2px solid #c2410c;
        color: #1e293b;
      }
      .info-row .info-chevron {
        font-size: 0.7rem;
        color: #6b7280;
        transition: transform 0.15s;
        display: inline-block;
      }
      .info-row[open] .info-chevron { transform: rotate(90deg); color: #c2410c; }
      .info-row[open] > summary { color: #1e293b; }
      .info-content {
        margin-top: 0.6rem;
        padding: 0.6rem 0.75rem;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 0.78rem;
        color: #475569;
        line-height: 1.55;
      }
      .info-content p { margin: 0 0 0.4rem; }
      .info-content p:last-child { margin-bottom: 0; }
      .info-content a { color: #c2410c; }
      .info-content a:hover, .info-content a:focus-visible { color: #9a3412; }
      .info-desc { margin-bottom: 0.75rem; }
      .info-dl-title {
        font-weight: 700;
        color: #1e293b;
        font-size: 0.78rem;
        margin-top: 0.25rem;
        margin-bottom: 0.2rem;
      }
      .info-dl-note { margin: 0 0 0.4rem; font-size: 0.73rem; color: #475569; }
      .info-dl-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.15rem 0.75rem;
      }
      .info-dl-list li { padding: 0.15rem 0; }
      .info-dl-list a {
        text-decoration: none;
        font-size: 0.76rem;
        color: #c2410c;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .info-dl-list a::before {
        content: '⬇';
        color: #6b7280;
        font-size: 0.8rem;
      }
      .info-dl-list a:hover,
      .info-dl-list a:focus-visible {
        text-decoration: underline;
        color: #9a3412;
      }
      .info-dl-list a:hover::before,
      .info-dl-list a:focus-visible::before { color: #c2410c; }

      /* ---- Accordion tables (accessible alternative to the map) ---- */
      .info-tables-title {
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #1e293b;
        margin: 1.25rem 0 0.5rem;
      }
      .info-tables-search { margin-bottom: 0.5rem; }
      .info-table-filter-input {
        width: 100%;
        padding: 0.4rem 0.6rem;
        border: 1px solid #6b7280;
        border-radius: 6px;
        font-size: 0.8rem;
        font-family: inherit;
        color: #1e293b;
        background: #fff;
        box-sizing: border-box;
      }
      .info-table-filter-input:focus-visible {
        outline: 2px solid #c2410c;
        outline-offset: 1px;
        border-color: #c2410c;
      }
      .info-table-section { margin-top: 0.75rem; }
      .info-table-section h4 {
        margin: 0 0 0.35rem;
        font-size: 0.78rem;
        font-weight: 600;
        color: #1e293b;
      }
      .info-table-wrap {
        overflow-x: auto;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #fff;
      }
      table.info-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.74rem;
        color: #1e293b;
      }
      table.info-table caption {
        text-align: left;
        font-size: 0.76rem;
        font-weight: 600;
        padding: 0.4rem 0.6rem 0.3rem;
        color: #1e293b;
        background: #f1f5f9;
        border-bottom: 1px solid #e2e8f0;
      }
      table.info-table th,
      table.info-table td {
        padding: 0.35rem 0.6rem;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
      }
      table.info-table th {
        font-weight: 600;
        color: #475569;
        background: #f8fafc;
        position: sticky;
        top: 0;
      }
      table.info-table td.num, table.info-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
      table.info-table tr:last-child td { border-bottom: none; }
      table.info-table tr[hidden] { display: none; }
      table.info-table a {
        color: #c2410c;
        text-decoration: none;
        font-size: 0.72rem;
      }
      table.info-table a:hover, table.info-table a:focus-visible {
        text-decoration: underline;
        color: #9a3412;
      }
      .info-table-section[hidden] { display: none; }

      /* ---- LOADING ---- */
      .loading-overlay {
        position: absolute; inset: 0; z-index: 700;
        background: rgba(192,89,58,.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0.75rem;
        font-size: 0.9rem; color: #fff;
      }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,.3); border-top-color: #fff;
        border-radius: 50%; animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ---- RESPONSIVE ---- */
      @container wrapper (max-width: 700px) {
        .filter-row { row-gap: 0.4rem; }
        .filter-spacer { flex: 0 0 100%; height: 0; }
        .search-input { width: 160px; }
        .search-input:focus { width: 200px; }
        .panel { width: 280px; }
        /* .year-label { font-size: 0.55rem; } SLIDER DÉSACTIVÉ */
      }

      @container wrapper (max-width: 480px) {
        .filter-row { gap: 0.35rem; row-gap: 0.4rem; }
        .filter-label { font-size: 0.78rem; }
        .filter-btn { padding: 0.25rem 0.55rem; font-size: 0.75rem; }
        .render-btn { padding: 0.25rem 0.5rem; font-size: 0.72rem; }
        .search-input { width: 140px; }
        .search-input:focus { width: 180px; }
        .panel { width: 100%; max-width: 100%; }
        .panel-title { font-size: 1.2rem; }
        .info-value { font-size: 0.95rem; }
        /* .year-label { font-size: 0.5rem; padding: 0.1rem 0.1rem; } SLIDER DÉSACTIVÉ */
      }

      @media (max-width: 700px) {
        .filter-row { row-gap: 0.4rem; }
        .filter-spacer { flex: 0 0 100%; height: 0; }
        .search-input { width: 160px; }
        .panel { width: 280px; }
        /* .year-label { font-size: 0.55rem; } SLIDER DÉSACTIVÉ */
      }
      @media (max-width: 480px) {
        .filter-row { gap: 0.35rem; row-gap: 0.4rem; }
        .filter-label { font-size: 0.78rem; }
        .filter-btn { padding: 0.25rem 0.55rem; font-size: 0.75rem; }
        .render-btn { padding: 0.25rem 0.5rem; font-size: 0.72rem; }
        .search-input { width: 140px; }
        .panel { width: 100%; max-width: 100%; }
        .panel-title { font-size: 1.2rem; }
        .info-value { font-size: 0.95rem; }
        /* .year-label { font-size: 0.5rem; padding: 0.1rem 0.1rem; } SLIDER DÉSACTIVÉ */
      }
    `;
  }
}

customElements.define('club-paris-map', ClubParisMap);
</script>
