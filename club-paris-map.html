// ---------------------------------------------------------------------------
// Web Component
// ---------------------------------------------------------------------------
class ClubParisMap extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this._data = null;
    this._selectedYear = 2024;
    this._filterMode = 'all';
    this._debtFilter = 'apd';
    this._selectedIso = null;
    this._geojson = null;
    this._projection = null;
    this._pathGen = null;
    this._zoom = null;
    this._lang = 'fr'; // will be resolved in connectedCallback once attributes are available
  }

  // Language detection: element lang attr > URL ?lang= > html[lang] > 'fr'
  _detectLang() {
    const attr = this.getAttribute('lang');
    if (attr === 'en') return 'en';
    if (attr === 'fr') return 'fr';
    const params = new URLSearchParams(window.location.search);
    const p = params.get('lang');
    if (p === 'en') return 'en';
    if (p === 'fr') return 'fr';
    const html = document.documentElement.lang?.toLowerCase() ?? '';
    if (html.startsWith('en')) return 'en';
    return 'fr';
  }

  _t(key) {
    return TRANSLATIONS[this._lang][key] ?? TRANSLATIONS.fr[key] ?? key;
  }

  _isoToName(iso) {
    return COUNTRY_NAMES[this._lang][iso] || iso;
  }

  connectedCallback() {
    this._lang = this._detectLang();
    this.shadowRoot.innerHTML = `
      <style>${this._getStyles()}</style>
      <div class="wrapper">
        <div class="top-bar">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">${this._t('filter.all')}</button>
            <button class="filter-btn filter-debtor" data-filter="débiteur">${this._t('filter.debtors')}</button>
            <button class="filter-btn filter-creditor" data-filter="créditeur">${this._t('filter.creditors')}</button>
          </div>
          <div class="filter-group debt-sub" style="display:none">
            <button class="filter-btn sub active" data-debt="apd">${this._t('filter.apd')}</button>
            <button class="filter-btn sub" data-debt="napd">${this._t('filter.napd')}</button>
          </div>
          <div class="legend-bar">
            <div class="legend-item">
              <div class="legend-gradient debtor-gradient"></div>
              <span class="legend-text">${this._t('map.legend_debtors')}</span>
            </div>
            <div class="legend-item">
              <div class="legend-gradient creditor-gradient"></div>
              <span class="legend-text">${this._t('map.legend_creditors')}</span>
            </div>
          </div>
        </div>
        <div class="map-area" id="map-area">
          <div class="panel" id="panel">
            <button class="panel-close" id="panel-close">&times;</button>
            <div id="panel-content"></div>
          </div>
          <div class="tooltip" id="tooltip"></div>
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <span>${this._t('loading')}</span>
          </div>
        </div>
        <div class="bottom-bar">
          <input type="range" class="year-slider" id="year-slider" min="2010" max="2024" value="2024" step="1" />
          <div class="year-labels" id="year-labels"></div>
        </div>
      </div>
    `;
    this._setup();
  }

  async _setup() {
    this._buildYearLabels();
    this._bindEvents();
    await this._loadData();
    this._initMap();
    this.shadowRoot.getElementById('loading').style.display = 'none';
  }

  _buildYearLabels() {
    const container = this.shadowRoot.getElementById('year-labels');
    for (let y = 2010; y <= 2024; y++) {
      const btn = document.createElement('button');
      btn.className = 'year-label' + (y === 2024 ? ' active' : '');
      btn.textContent = y;
      btn.dataset.year = y;
      container.appendChild(btn);
    }
  }

  _bindEvents() {
    const sr = this.shadowRoot;
    sr.querySelectorAll('.filter-btn:not(.sub)').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn:not(.sub)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._filterMode = btn.dataset.filter;
        sr.querySelector('.debt-sub').style.display = this._filterMode === 'débiteur' ? 'flex' : 'none';
        this._updateColors();
      });
    });
    sr.querySelectorAll('.filter-btn.sub').forEach(btn => {
      btn.addEventListener('click', () => {
        sr.querySelectorAll('.filter-btn.sub').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this._debtFilter = btn.dataset.debt;
        this._updateColors();
      });
    });
    const slider = sr.getElementById('year-slider');
    slider.addEventListener('input', () => {
      this._selectedYear = parseInt(slider.value);
      this._updateYearLabels();
      this._updateColors();
      this._updatePanel();
    });
    sr.getElementById('year-labels').addEventListener('click', (e) => {
      if (e.target.dataset.year) {
        this._selectedYear = parseInt(e.target.dataset.year);
        slider.value = this._selectedYear;
        this._updateYearLabels();
        this._updateColors();
        this._updatePanel();
      }
    });
    sr.getElementById('panel-close').addEventListener('click', () => this._closePanel());
  }

  _updateYearLabels() {
    this.shadowRoot.querySelectorAll('.year-label').forEach(l => {
      l.classList.toggle('active', parseInt(l.dataset.year) === this._selectedYear);
    });
  }

  async _loadData() {
    const base = new URL('.', location.href).href;
    const [dataResp, topoResp] = await Promise.all([
      fetch(base + 'app/public/data.json'),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    ]);
    this._data = await dataResp.json();
    const topo = await topoResp.json();
    this._geojson = topojson.feature(topo, topo.objects.countries);
  }

  _initMap() {
    const container = this.shadowRoot.getElementById('map-area');
    const w = container.clientWidth;
    const h = container.clientHeight;

    this._projection = d3.geoMercator()
      .scale(w / 6.5)
      .center([10, 25])
      .translate([w / 2, h / 2]);

    this._pathGen = d3.geoPath().projection(this._projection);

    const svg = d3.select(container)
      .insert('svg', ':first-child')
      .attr('width', w)
      .attr('height', h)
      .style('display', 'block');

    const g = svg.append('g');

    // Zoom & pan
    this._zoom = d3.zoom()
      .scaleExtent([1, 8])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(this._zoom);

    // Draw countries
    const self = this;
    g.selectAll('path')
      .data(this._geojson.features)
      .join('path')
      .attr('d', this._pathGen)
      .attr('class', 'country')
      .attr('data-id', d => this._numToIso(String(d.id)) || '')
      .attr('fill', d => {
        const iso = this._numToIso(String(d.id));
        return iso ? this._getColor(iso) : '#e5e7eb';
      })
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .on('click', function(event, d) {
        const iso = self._numToIso(String(d.id));
        if (iso) self._selectCountry(iso);
      })
      .on('mouseenter', function(event, d) {
        const iso = self._numToIso(String(d.id));
        d3.select(this).attr('stroke', '#3b82f6').attr('stroke-width', 1.5);
        self._showTooltip(event, iso, d);
      })
      .on('mousemove', function(event) {
        self._moveTooltip(event);
      })
      .on('mouseleave', function() {
        const iso = self._numToIso(String(d3.select(this).datum().id));
        const isSel = iso === self._selectedIso;
        d3.select(this)
          .attr('stroke', isSel ? '#1e40af' : '#fff')
          .attr('stroke-width', isSel ? 2 : 0.5);
        self._hideTooltip();
      });

    this._svg = svg;
    this._g = g;
  }

  _updateColors() {
    if (!this._g) return;
    this._maxDebtor = null;
    this._computeMaxValues();
    const self = this;
    this._g.selectAll('path.country')
      .attr('fill', function() {
        const iso = d3.select(this).attr('data-id');
        return iso ? self._getColor(iso) : '#e5e7eb';
      })
      .attr('stroke', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? '#1e40af' : '#fff';
      })
      .attr('stroke-width', function() {
        const iso = d3.select(this).attr('data-id');
        return iso === self._selectedIso ? 2 : 0.5;
      });
  }

  _showTooltip(event, iso, d) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const yd = this._getYearData();
    const c = yd?.countries[iso];
    const name = this._isoToName(iso) || d.properties?.name || iso;
    let text = name;
    if (c) {
      if (c.debtor && c.debtor.total > 0) text += ` — ${this._t('map.debt')}: ${this._fmt(c.debtor.total)}`;
      if (c.creditor) text += ` — ${this._t('map.creditor_label')} (${c.creditor.nbAccords} ${this._t('map.agreements')})`;
    }
    tip.textContent = text;
    tip.style.display = 'block';
    this._moveTooltip(event);
  }

  _moveTooltip(event) {
    const tip = this.shadowRoot.getElementById('tooltip');
    const area = this.shadowRoot.getElementById('map-area');
    const rect = area.getBoundingClientRect();
    tip.style.left = (event.clientX - rect.left + 12) + 'px';
    tip.style.top = (event.clientY - rect.top - 28) + 'px';
  }

  _hideTooltip() {
    this.shadowRoot.getElementById('tooltip').style.display = 'none';
  }

  _selectCountry(iso) {
    this._selectedIso = iso;
    this._updateColors();
    this._updatePanel();
    this.shadowRoot.getElementById('panel').classList.add('open');
  }

  _closePanel() {
    this.shadowRoot.getElementById('panel').classList.remove('open');
    this._selectedIso = null;
    this._updateColors();
  }

  _getYearData() {
    return this._data ? this._data[String(this._selectedYear)] : null;
  }

  _getColor(iso) {
    const yd = this._getYearData();
    if (!yd) return '#e5e7eb';
    const c = yd.countries[iso];
    if (!c) return '#e5e7eb';
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;
    if (!this._maxDebtor) this._computeMaxValues();

    if (this._filterMode === 'créditeur') {
      return isCreditor ? this._greenScale(c.creditor.nbAccords) : '#e5e7eb';
    }
    if (this._filterMode === 'débiteur') {
      if (!isDebtor) return '#e5e7eb';
      const val = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
      return val > 0 ? this._orangeScale(val) : '#e5e7eb';
    }
    if (isCreditor && !isDebtor) return this._greenScale(c.creditor.nbAccords);
    if (isDebtor) return this._orangeScale(c.debtor.apd);
    if (isCreditor) return this._greenScale(c.creditor.nbAccords);
    return '#e5e7eb';
  }

  _computeMaxValues() {
    const yd = this._getYearData();
    if (!yd) { this._maxDebtor = 1; this._maxCreditor = 1; return; }
    let maxD = 1, maxC = 1;
    for (const c of Object.values(yd.countries)) {
      if (c.debtor) {
        const v = this._debtFilter === 'apd' ? c.debtor.apd : c.debtor.napd;
        if (v > maxD) maxD = v;
      }
      if (c.creditor && c.creditor.nbAccords > maxC) maxC = c.creditor.nbAccords;
    }
    this._maxDebtor = maxD;
    this._maxCreditor = maxC;
  }

  _orangeScale(val) {
    const t = Math.min(val / this._maxDebtor, 1);
    return this._interpolateColors([[254,243,226],[253,186,116],[249,115,22],[194,65,12]], t);
  }

  _greenScale(val) {
    const t = Math.min(val / this._maxCreditor, 1);
    return this._interpolateColors([[236,253,245],[110,231,183],[16,185,129],[4,120,87]], t);
  }

  _interpolateColors(colors, t) {
    const n = colors.length - 1;
    const idx = Math.min(Math.floor(t * n), n - 1);
    const local = (t * n) - idx;
    const c1 = colors[idx], c2 = colors[idx + 1];
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * local);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * local);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * local);
    return `rgb(${r},${g},${b})`;
  }

  _updatePanel() {
    const el = this.shadowRoot.getElementById('panel-content');
    if (!this._selectedIso) { el.innerHTML = ''; return; }
    const yd = this._getYearData();
    const c = yd?.countries[this._selectedIso];
    if (!c) { el.innerHTML = `<p>${this._t('map.no_data')}</p>`; return; }

    const name = this._isoToName(this._selectedIso) || c.country;
    const isDebtor = c.debtor && c.debtor.total > 0;
    const isCreditor = !!c.creditor;

    const subtitle = isDebtor && isCreditor
      ? this._t('panel.debtor_creditor')
      : isCreditor ? this._t('panel.creditor') : this._t('panel.debtor');

    let html = `<h2>${name}</h2>`;
    html += `<p class="panel-subtitle">${subtitle}</p>`;
    html += `<p class="panel-year">${this._t('panel.year')} ${this._selectedYear}</p>`;

    if (isDebtor) {
      const d = c.debtor;
      const apdPct = d.total > 0 ? ((d.apd / d.total) * 100).toFixed(1) : 0;
      const napdPct = d.total > 0 ? ((d.napd / d.total) * 100).toFixed(1) : 0;
      html += `<div class="section"><h4 class="section-head debtor-head">${this._t('panel.section_debtor')}</h4>`;
      html += `<div class="stat"><span class="stat-label">${this._t('panel.apd_short')}</span><span class="stat-val">${this._fmt(d.apd)}</span><span class="stat-pct">${apdPct}%</span></div>`;
      html += `<div class="stat"><span class="stat-label">${this._t('panel.napd_short')}</span><span class="stat-val">${this._fmt(d.napd)}</span><span class="stat-pct">${napdPct}%</span></div>`;
      html += `<div class="stat total"><span class="stat-label">${this._t('panel.total')}</span><span class="stat-val">${this._fmt(d.total)}</span></div>`;
      html += `<div class="bar"><div class="bar-apd" style="width:${apdPct}%"></div><div class="bar-napd" style="width:${napdPct}%"></div></div>`;
      if (d.url) html += `<a class="link debtor-link" href="${d.url}" target="_blank" rel="noopener">${this._t('panel.debtor_link')} &#8599;</a>`;
      html += `</div>`;
    }

    if (isCreditor) {
      const cr = c.creditor;
      html += `<div class="section"><h4 class="section-head creditor-head">${this._t('panel.section_creditor')}</h4>`;
      html += `<div class="stat creditor"><span class="stat-label">${this._t('panel.agreements')}</span><span class="stat-val">${cr.nbAccords}</span></div>`;
      if (cr.premiereParticipation) html += `<div class="stat creditor"><span class="stat-label">${this._t('panel.member_since')}</span><span class="stat-val">${cr.premiereParticipation}</span></div>`;
      if (cr.statut) html += `<div class="stat creditor"><span class="stat-label">${this._t('panel.status')}</span><span class="stat-val">${cr.statut}</span></div>`;
      if (cr.url) html += `<a class="link creditor-link" href="${cr.url}" target="_blank" rel="noopener">${this._t('panel.creditor_link')} &#8599;</a>`;
      html += `</div>`;
    }

    el.innerHTML = html;
  }

  _fmt(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(2)} Md€`;
    if (val >= 1e6) return `${(val / 1e6).toFixed(1)} M€`;
    if (val === 0) return '0 €';
    return val.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' €';
  }

  _getStyles() {
    return `
      :host { display: block; }
      .wrapper {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        border-radius: 10px; overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,.12);
        background: #fff;
        position: relative;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1e293b;
      }

      /* ---- TOP BAR ---- */
      .top-bar {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.5rem 0.75rem;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        flex-wrap: wrap;
        z-index: 10;
      }
      .filter-group { display: flex; gap: 0.25rem; align-items: center; }
      .filter-btn {
        padding: 0.3rem 0.7rem; border: 1px solid #e2e8f0; border-radius: 6px;
        background: #fff; font-size: 0.78rem; color: #64748b; cursor: pointer;
        transition: all .15s;
      }
      .filter-btn:hover { background: #f1f5f9; }
      .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
      .filter-btn.filter-debtor.active { background: #f97316; border-color: #f97316; }
      .filter-btn.filter-creditor.active { background: #10b981; border-color: #10b981; }
      .filter-btn.sub { padding: 0.25rem 0.55rem; font-size: 0.72rem; }

      .legend-bar { margin-left: auto; display: flex; gap: 0.75rem; align-items: center; }
      .legend-item { display: flex; align-items: center; gap: 0.35rem; }
      .legend-gradient { width: 60px; height: 8px; border-radius: 4px; }
      .debtor-gradient { background: linear-gradient(to right, #fef3e2, #fdba74, #f97316, #c2410c); }
      .creditor-gradient { background: linear-gradient(to right, #ecfdf5, #6ee7b7, #10b981, #047857); }
      .legend-text { font-size: 0.7rem; color: #64748b; }

      /* ---- MAP AREA ---- */
      .map-area {
        flex: 1; position: relative; min-height: 0;
        background: #dbeafe;
        overflow: hidden;
      }
      .map-area svg { display: block; }

      /* ---- TOOLTIP ---- */
      .tooltip {
        position: absolute; display: none;
        background: #1e293b; color: #fff;
        padding: 0.4rem 0.65rem; border-radius: 5px;
        font-size: 0.8rem; pointer-events: none;
        white-space: nowrap; z-index: 500;
        box-shadow: 0 2px 6px rgba(0,0,0,.2);
      }

      /* ---- PANEL ---- */
      .panel {
        position: absolute; top: 0; right: 0; bottom: 0;
        width: 320px; max-width: 85%;
        background: #fff; box-shadow: -4px 0 16px rgba(0,0,0,.15);
        z-index: 800; padding: 1rem; padding-top: 2.5rem;
        transform: translateX(100%); transition: transform .25s ease;
        overflow-y: auto;
      }
      .panel.open { transform: translateX(0); }
      .panel-close {
        position: sticky; top: 0; float: right;
        background: #f1f5f9; border: 1px solid #e2e8f0;
        width: 28px; height: 28px; border-radius: 50%;
        font-size: 1.2rem; color: #64748b; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        line-height: 1; z-index: 10; margin-top: -2rem; margin-bottom: 0.5rem;
      }
      .panel-close:hover { color: #1e293b; background: #e2e8f0; }

      .panel h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.15rem; }
      .panel-subtitle { font-size: 0.78rem; color: #64748b; margin-bottom: 0.1rem; }
      .panel-year { font-size: 0.72rem; color: #94a3b8; margin-bottom: 0.75rem; }

      .section { margin-bottom: 0.75rem; }
      .section-head {
        font-size: 0.8rem; font-weight: 600; padding: 0.3rem 0.5rem;
        border-radius: 4px; margin-bottom: 0.4rem;
      }
      .debtor-head { color: #c2410c; background: #fff7ed; border-left: 3px solid #f97316; }
      .creditor-head { color: #047857; background: #ecfdf5; border-left: 3px solid #10b981; }

      .stat {
        display: flex; align-items: baseline; gap: 0.5rem;
        padding: 0.35rem 0.6rem; border-radius: 6px;
        background: #f8fafc; margin-bottom: 0.3rem;
        border-left: 3px solid #f97316;
      }
      .stat.total { border-left-color: #10b981; background: #f0fdf4; }
      .stat.creditor { border-left-color: #10b981; }
      .stat-label { font-size: 0.72rem; color: #64748b; min-width: 70px; }
      .stat-val { font-size: 0.95rem; font-weight: 700; }
      .stat-pct { font-size: 0.65rem; color: #94a3b8; }

      .bar {
        display: flex; height: 6px; border-radius: 3px; overflow: hidden;
        background: #e2e8f0; margin: 0.4rem 0;
      }
      .bar-apd { background: #f97316; }
      .bar-napd { background: #3b82f6; }

      .link {
        display: inline-block; font-size: 0.75rem; font-weight: 500;
        padding: 0.3rem 0.6rem; border-radius: 5px;
        text-decoration: none; margin-top: 0.3rem; transition: opacity .2s;
      }
      .link:hover { opacity: .8; }
      .debtor-link { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
      .creditor-link { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }

      /* ---- BOTTOM BAR ---- */
      .bottom-bar {
        padding: 0.4rem 1rem 0.5rem;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
        z-index: 10;
      }
      .year-slider {
        width: 100%; margin: 0;
        -webkit-appearance: none; appearance: none;
        height: 4px; background: #e2e8f0; border-radius: 2px; outline: none;
      }
      .year-slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 16px; height: 16px; background: #2563eb;
        border-radius: 50%; cursor: pointer;
        box-shadow: 0 2px 4px rgba(37,99,235,.3);
      }
      .year-slider::-moz-range-thumb {
        width: 16px; height: 16px; background: #2563eb;
        border-radius: 50%; cursor: pointer; border: none;
        box-shadow: 0 2px 4px rgba(37,99,235,.3);
      }
      .year-labels {
        display: flex; justify-content: space-between;
        margin-top: 0.2rem;
      }
      .year-label {
        background: none; border: none; font-size: 0.65rem;
        color: #94a3b8; cursor: pointer; padding: 0.1rem 0.2rem;
        border-radius: 3px; transition: all .15s;
      }
      .year-label:hover { color: #2563eb; background: #eff6ff; }
      .year-label.active { color: #2563eb; font-weight: 700; }

      /* ---- LOADING ---- */
      .loading-overlay {
        position: absolute; inset: 0; z-index: 700;
        background: rgba(255,255,255,.9);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0.75rem;
        font-size: 0.85rem; color: #64748b;
      }
      .spinner {
        width: 32px; height: 32px;
        border: 3px solid #e2e8f0; border-top-color: #2563eb;
        border-radius: 50%; animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    `;
  }
}

customElements.define('club-paris-map', ClubParisMap);
