name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'sources/**'
      - 'processing/**'
      - 'README.md'
      - 'CLAUDE.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify data.json is up to date
        run: python3 processing/build_data.py --check

      - name: Stage site
        run: |
          mkdir -p dist/downloads
          cp index.html data.json dist/
          cp downloads/*.csv dist/downloads/
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
